<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет методиста - Институт ДПО</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient-primary shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-building me-2"></i>Институт ДПО
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active rounded-pill" href="methodist-cabinet.html">
                            <i class="bi bi-people me-1"></i>Слушатели
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link rounded-pill" href="methodist-fields.html">
                            <i class="bi bi-gear me-1"></i>Управление полями
                        </a>
                    </li>
                </ul>
                <div class="navbar-nav">
                    <span class="nav-link text-white" id="methodistName">Методист</span>
                    <button class="btn btn-outline-light btn-sm rounded-pill ms-3" onclick="AuthService.signOut()">
                        <i class="bi bi-box-arrow-right me-1"></i>Выйти
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 bg-gradient-info text-white">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-white-50">Всего слушателей</h6>
                                <h2 class="fw-bold mb-0" id="totalListeners">0</h2>
                            </div>
                            <i class="bi bi-people display-4"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 bg-gradient-success text-white">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-white-50">Зачислено на курсы</h6>
                                <h2 class="fw-bold mb-0" id="enrolledListeners">0</h2>
                            </div>
                            <i class="bi bi-mortarboard display-4"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 bg-gradient-warning text-white">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-white-50">Требуют проверки</h6>
                                <h2 class="fw-bold mb-0" id="pendingDocs">0</h2>
                            </div>
                            <i class="bi bi-file-earmark-text display-4"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body p-3">
                <div class="row g-3 align-items-center">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 rounded-pill-start">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" class="form-control border-start-0" 
                                   id="searchInput" placeholder="Поиск по ФИО или email..."
                                   onkeyup="searchListeners()">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select rounded-pill" id="courseFilter" onchange="filterListeners()">
                            <option value="all">Все курсы</option>
                            <option value="enrolled">Зачисленные</option>
                            <option value="not_enrolled">Не зачисленные</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary rounded-pill w-100" onclick="exportToCSV()">
                            <i class="bi bi-download me-1"></i>Экспорт CSV
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                <h4 class="fw-bold mb-0">
                    <i class="bi bi-people-fill text-primary me-2"></i>Список слушателей
                </h4>
                <span class="badge bg-primary rounded-pill" id="listenersCount">0 слушателей</span>
            </div>
            <div class="card-body px-4 pb-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="rounded-start">Слушатель</th>
                                <th>Email</th>
                                <th>Телефон</th>
                                <th>Курс</th>
                                <th>Дата регистрации</th>
                                <th class="rounded-end">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="listenersTableBody"></tbody>
                    </table>
                </div>
                <div id="noResults" class="text-center py-5 d-none">
                    <i class="bi bi-search display-4 text-muted"></i>
                    <h5 class="text-muted mt-3">Слушатели не найдены</h5>
                    <p class="text-muted">Попробуйте изменить параметры поиска</p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-header">
                <i class="bi bi-info-circle me-2"></i>
                <strong class="me-auto">Уведомление</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="image-compressor.js"></script>
    <script src="document-service.js"></script>
    <script src="methodist.js"></script>
</body>
</html>
