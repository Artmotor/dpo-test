<!-- 404.html - SPA роутинг для GitHub Pages -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перенаправление - Институт ДПО</title>
    <script>
        // Сохраняем путь и перенаправляем на index.html
        (function(){
            var path = window.location.pathname;
            // Не перенаправляем, если это корень или файл
            if (path === '/' || path.match(/\.(html|css|js|png|jpg|svg|ico)$/)) {
                return;
            }
            sessionStorage.setItem('redirect', window.location.href);
            window.location.replace('/');
        })();
    </script>
</head>
<body>
    <div style="text-align:center;padding:50px;font-family:sans-serif;">
        <h2>Перенаправление...</h2>
        <p><a href="/">Нажмите здесь, если перенаправление не работает</a></p>
    </div>
</body>
</html>
