<!-- 404.html - SPA роутинг для GitHub Pages -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перенаправление - Институт ДПО</title>
    <script>
        // Сохраняем путь и перенаправляем на index.html
        (function(){
            var path = window.location.pathname;
            
            // Не перенаправляем если это корень или файл с расширением
            if (path === '/' || path.match(/\.\w+$/)) {
                return;
            }
            
            // Сохраняем URL для восстановления после загрузки index.html
            sessionStorage.setItem('redirect', window.location.href);
            
            // Перенаправляем на главную
            window.location.replace('/');
        })();
    </script>
</head>
<body>
    <div style="text-align:center;padding:50px;font-family:Arial,sans-serif;">
        <h2>Перенаправление...</h2>
        <p>Если перенаправление не работает, <a href="/">нажмите здесь</a></p>
    </div>
</body>
</html>
