<!-- 404.html - SPA роутинг для GitHub Pages -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перенаправление - Институт ДПО</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
    <script>
        // Сохраняем путь для SPA роутинга
        sessionStorage.redirect = location.href;
    </script>
    <meta http-equiv="refresh" content="0;URL='/'">
</head>
<body class="bg-gradient-primary">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="text-center">
            <div class="spinner-border text-white mb-4" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Загрузка...</span>
            </div>
            <h4 class="text-white">Перенаправление...</h4>
            <p class="text-white-50">Если перенаправление не работает, <a href="/" class="text-white">нажмите здесь</a></p>
        </div>
    </div>
</body>
</html>
