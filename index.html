<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Вход в систему</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2c5f2d;
            --primary-dark: #1e3a1f;
            --primary-light: #4a7c4b;
            --secondary: #ffc107;
            --secondary-dark: #e0a800;
            --accent: #97233f;
            --gray-light: #f5f5f5;
            --gray: #ddd;
            --dark: #333;
            --white: #fff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ff9800;
            --info: #17a2b8;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-hover: 0 10px 20px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-hover);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "🎓";
            position: absolute;
            font-size: 120px;
            opacity: 0.1;
            right: -20px;
            top: -30px;
            transform: rotate(15deg);
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 10px;
            background: var(--secondary);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
            font-weight: 400;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid var(--gray-light);
            background: var(--white);
        }

        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            background: var(--white);
            border: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            color: var(--dark);
            font-family: inherit;
        }

        .tab:hover {
            background: var(--gray-light);
        }

        .tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
            background: var(--white);
        }

        .form-container {
            padding: 35px 30px;
        }

        .form {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
            font-size: 14px;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            width: 100%;
            padding: 13px 45px 13px 15px;
            border: 2px solid var(--gray);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .password-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44, 95, 45, 0.1);
        }

        input, select {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid var(--gray);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44, 95, 45, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            font-size: 18px;
            padding: 0;
            width: auto;
            color: #999;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        button:active {
            transform: translateY(0);
        }

        .forgot-password {
            text-align: right;
            margin-top: 8px;
        }

        .forgot-password a {
            color: var(--primary);
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .error-message {
            color: var(--danger);
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .success-message, .info-message {
            padding: 12px 15px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.3s;
            font-size: 14px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid var(--success);
        }

        .info-message {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid var(--info);
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background-color: var(--white);
            margin: 15% auto;
            padding: 0;
            border-radius: var(--radius);
            width: 90%;
            max-width: 400px;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            border-radius: var(--radius) var(--radius) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-weight: 500;
        }

        .close {
            color: var(--white);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            line-height: 1;
        }

        .close:hover {
            color: var(--secondary);
        }

        .modal-body {
            padding: 25px;
        }

        .modal-footer {
            padding: 20px;
            text-align: right;
            border-top: 1px solid var(--gray);
            display: flex;
            gap: 10px;
        }

        .btn-secondary {
            background: #6c757d;
            width: auto;
            padding: 10px 20px;
            font-size: 14px;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-primary-modal {
            background: var(--primary);
            width: auto;
            padding: 10px 20px;
            font-size: 14px;
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .logo-icon {
                width: 60px;
                height: 60px;
                font-size: 48px;
            }
            
            .form-container {
                padding: 25px 20px;
            }
            
            .tab {
                padding: 12px;
                font-size: 14px;
            }
            
            .modal-footer {
                flex-direction: column;
            }
            
            .modal-footer button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .form-group input,
            .form-group select {
                padding: 11px 12px;
            }
            
            button {
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-icon">🎓</div>
            <h1>ТЕСТОВЫЙ СТЕНД. НЕ ВВОДИТЕ РЕАЛЬНЫЕ ДАННЫЕ. Любая информация, введенная здесь, будет удалена.</h1>
            <p>Система</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">1</button>
            <button class="tab" onclick="switchTab('register')">2</button>
        </div>
        <div class="form-container">
              <div id="loginForm" class="form active">
                <div id="loginSuccess" class="success-message"></div>
                <div id="loginInfo" class="info-message"></div>
                <div class="form-group">
                    <label>Число 13</label>
                    <input type="email" id="loginEmail" placeholder="874" autocomplete="email">
                    <div id="loginEmailError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label>Число 12</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Число 11" autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">👁️</button>
                    </div>
                    <div id="loginPasswordError" class="error-message"></div>
                </div>
                <div class="forgot-password">
                    <a onclick="showResetPasswordModal()">Число 8</a>
                </div>
                <button onclick="login()">Число 10</button>
            </div>
            <div id="registerForm" class="form">
                <div id="registerSuccess" class="success-message"></div>
                <div class="form-group">
                    <label>число 1 *</label>
                    <input type="text" id="regFullName" placeholder="123">
                    <div id="regFullNameError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label>Дробное число</label>
                    <input type="email" id="regEmail" placeholder="1/5">
                    <div id="regEmailError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label>Число 2</label>
                    <input type="tel" id="regPhone" placeholder="1785623">
                    <div id="regPhoneError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label>Число 3</label>
                    <select id="regEducation">
                        <option value="">Выберите параметр</option>
                        <option value="1">if</option>
                        <option value="2">then</option>
                        <option value="3">goto</option>
                    </select>
                    <div id="regEducationError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label>Число 4*</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" placeholder="Не менее 6 символов">
                        <button type="button" class="toggle-password" onclick="togglePassword('regPassword')">👁️</button>
                    </div>
                    <div id="regPasswordError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label>Число 5 *</label>
                    <div class="password-wrapper">
                        <input type="password" id="regConfirmPassword" placeholder="09E52">
                        <button type="button" class="toggle-password" onclick="togglePassword('regConfirmPassword')">👁️</button>
                    </div>
                    <div id="regConfirmError" class="error-message"></div>
                </div>
                <button onclick="register()">Нажать</button>
            </div>
        </div>
    </div>

    <div id="resetModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Число 6</h3>
                <span class="close" onclick="closeResetModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="resetMessage" class="success-message"></div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="resetEmail" placeholder="example@mail.ru">
                    <div id="resetEmailError" class="error-message"></div>
                </div>
                <p style="font-size: 12px; color: #666; margin-top: 10px;"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeResetModal()">Да</button>
                <button class="btn-primary-modal" onclick="resetPassword()">Нет</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    
    <script>
        // Переключение между вкладками
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab');
            
            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        // Переключение видимости пароля
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input) {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
            }
        }

        // Показ сообщений
        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            if (el) {
                el.textContent = message;
                el.style.display = 'block';
                setTimeout(() => { el.style.display = 'none'; }, 5000);
            }
        }

        function showSuccess(elementId, message) {
            const el = document.getElementById(elementId);
            if (el) {
                el.textContent = message;
                el.style.display = 'block';
                setTimeout(() => { el.style.display = 'none'; }, 5000);
            }
        }

        // Функция регистрации
        async function register() {
            const fullName = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const education = document.getElementById('regEducation').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            // Валидация
            if (!fullName || !email || !password) {
                showError('regFullNameError', 'Заполните все обязательные поля');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('regConfirmError', 'Пароли не совпадают');
                return;
            }
            
            if (password.length < 6) {
                showError('regPasswordError', 'Пароль должен быть не менее 6 символов');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('regEmailError', 'Введите корректный email');
                return;
            }
            
            try {
                // Создаем пользователя в Auth
                const userCredential = await window.auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Отправляем письмо для подтверждения email
                await user.sendEmailVerification();
                
                // Сохраняем пользователя с ролью "student"
                await window.db.collection('users').doc(user.uid).set({
                    fullName: fullName,
                    email: email,
                    phone: phone || '',
                    education: education || '',
                    role: 'student',
                    emailVerified: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    actualAddress: '',
                    registrationAddress: '',
                    passportNumber: '',
                    passportIssuedBy: '',
                    passportIssueDate: '',
                    snils: ''
                });
                
                // Выходим из системы
                await window.auth.signOut();
                
                showSuccess('registerSuccess', '✅ Регистрация успешна! Подтвердите email и войдите в систему.');
                
                // Очищаем форму
                document.getElementById('regFullName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPhone').value = '';
                document.getElementById('regEducation').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regConfirmPassword').value = '';
                
                // Переключаемся на форму входа
                setTimeout(() => {
                    switchTab('login');
                    document.getElementById('loginEmail').value = email;
                }, 2000);
                
            } catch (error) {
                console.error('Ошибка регистрации:', error);
                let errorMsg = error.message;
                if (errorMsg.includes('email-already-in-use')) {
                    errorMsg = 'Пользователь с таким email уже существует';
                } else if (errorMsg.includes('weak-password')) {
                    errorMsg = 'Пароль слишком слабый';
                }
                showError('regEmailError', errorMsg);
            }
        }

        // Функция входа
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showError('loginEmailError', 'Введите email и пароль');
                return;
            }
            
            try {
                const userCredential = await window.auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Проверяем подтверждение email
                if (!user.emailVerified) {
                    await window.auth.signOut();
                    showError('loginEmailError', 'Подтвердите email перед входом. Проверьте почту');
                    return;
                }
                
                // Получаем данные пользователя
                const userDoc = await window.db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                if (!userData) {
                    await window.auth.signOut();
                    showError('loginEmailError', 'Ошибка: данные пользователя не найдены');
                    return;
                }
                
                // Обновляем время последнего входа
                await window.db.collection('users').doc(user.uid).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Перенаправление по роли
                if (userData.role === 'admin') {
                    window.location.href = 'admin-cabinet.html';
                } else if (userData.role === 'metodist') {
                    window.location.href = 'metodist-cabinet.html';
                } else if (userData.role === 'student') {
                    window.location.href = 'student-cabinet.html';
                } else {
                    await window.auth.signOut();
                    showError('loginEmailError', 'Неизвестная роль пользователя');
                }
                
            } catch (error) {
                console.error('Ошибка входа:', error);
                let errorMsg = error.message;
                if (errorMsg.includes('user-not-found') || errorMsg.includes('wrong-password')) {
                    errorMsg = 'Неверный email или пароль';
                } else if (errorMsg.includes('too-many-requests')) {
                    errorMsg = 'Слишком много попыток. Попробуйте позже';
                }
                showError('loginEmailError', errorMsg);
            }
        }

        // Модальное окно сброса пароля
        function showResetPasswordModal() {
            document.getElementById('resetModal').style.display = 'block';
            document.getElementById('resetEmail').value = '';
        }

        function closeResetModal() {
            document.getElementById('resetModal').style.display = 'none';
        }

        async function resetPassword() {
            const email = document.getElementById('resetEmail').value.trim();
            if (!email) {
                showError('resetEmailError', 'Введите email');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('resetEmailError', 'Введите корректный email');
                return;
            }
            
            try {
                await window.auth.sendPasswordResetEmail(email);
                showSuccess('resetMessage', '✅ Ссылка для сброса пароля отправлена на email');
                setTimeout(() => {
                    closeResetModal();
                }, 2000);
            } catch (error) {
                console.error('Ошибка сброса:', error);
                let errorMsg = error.message;
                if (errorMsg.includes('user-not-found')) {
                    errorMsg = 'Пользователь с таким email не найден';
                }
                showError('resetEmailError', errorMsg);
            }
        }

        // Закрытие модального окна при клике вне его
        window.onclick = function(event) {
            const modal = document.getElementById('resetModal');
            if (event.target === modal) {
                closeResetModal();
            }
        }

        // Функция для создания первого администратора (вызвать через консоль)
        window.createFirstAdmin = async function() {
            const adminEmail = "npo-artel@yandex.ru";
            const adminPassword = "Admin123456";
            const adminFullName = "Главный администратор";
            
            try {
                // Проверяем, существует ли уже администратор
                const existingQuery = await window.db.collection('users').where('role', '==', 'admin').get();
                if (!existingQuery.empty) {
                    console.log("Администратор уже существует!");
                    alert("Администратор уже создан в системе");
                    return;
                }
                
                const userCredential = await window.auth.createUserWithEmailAndPassword(adminEmail, adminPassword);
                const user = userCredential.user;
                await user.sendEmailVerification();
                await window.db.collection('users').doc(user.uid).set({
                    fullName: adminFullName,
                    email: adminEmail,
                    phone: "",
                    role: 'admin',
                    emailVerified: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await window.auth.signOut();
                console.log("✅ Администратор создан!");
                console.log("📧 Email:", adminEmail);
                console.log("🔑 Пароль:", adminPassword);
                console.log("⚠️ Не забудьте подтвердить email перед входом!");
                alert("Администратор создан!\n\nEmail: " + adminEmail + "\nПароль: " + adminPassword + "\n\nПодтвердите email перед входом");
            } catch(e) {
                console.error("Ошибка создания администратора:", e);
                alert("Ошибка: " + e.message);
            }
        };
        
        console.log("%c🎓 Институт ДПО - Система готова к работе", "color: #2c5f2d; font-size: 16px; font-weight: bold;");
        console.log("%cДля создания первого администратора выполните в консоли: window.createFirstAdmin()", "color: #ffc107; font-size: 12px;");
        
        // Автоматическая проверка, не залогинен ли уже пользователь
        window.auth.onAuthStateChanged(async (user) => {
            if (user && user.emailVerified) {
                try {
                    const userDoc = await window.db.collection('users').doc(user.uid).get();
                    const userData = userDoc.data();
                    if (userData) {
                        if (userData.role === 'admin') {
                            window.location.href = 'admin-cabinet.html';
                        } else if (userData.role === 'metodist') {
                            window.location.href = 'metodist-cabinet.html';
                        } else if (userData.role === 'student') {
                            window.location.href = 'student-cabinet.html';
                        }
                    }
                } catch(e) {
                    console.error('Ошибка проверки роли:', e);
                }
            }
        });
    </script>
