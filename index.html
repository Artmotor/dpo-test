<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Институт ДПО - Вход в систему</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #f8f9fa;
            border: none;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .form-container {
            padding: 30px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            color: #667eea;
            font-size: 18px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .forgot-password {
            text-align: right;
            margin-top: 10px;
        }

        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .success-message, .info-message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.5s;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
        }

        .info-message {
            background: #d1ecf1;
            color: #0c5460;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 0;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 20px;
            text-align: right;
            border-top: 1px solid #eee;
        }

        .close {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #ccc;
        }

        .btn-secondary {
            background: #6c757d;
            margin-right: 10px;
            width: auto;
            padding: 10px 20px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 10px;
            color: #667eea;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
            }
            .form-container {
                padding: 20px;
            }
            .tab {
                padding: 10px;
                font-size: 14px;
            }
            button {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Институт ДПО</h1>
            <p>Система дистанционного обучения</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">🔐 Вход</button>
            <button class="tab" onclick="switchTab('register')">📝 Регистрация</button>
        </div>

        <div class="form-container">
            <div id="loadingIndicator" class="loading">⏳ Загрузка...</div>
            
            <!-- Форма входа -->
            <div id="loginForm" class="form active">
                <div id="loginSuccess" class="success-message"></div>
                <div id="loginInfo" class="info-message"></div>
                
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="loginEmail" placeholder="example@mail.ru">
                    <div id="loginEmailError" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label>🔒 Пароль</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Введите пароль">
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">👁️</button>
                    </div>
                    <div id="loginPasswordError" class="error-message"></div>
                </div>
                
                <div class="forgot-password">
                    <a onclick="showResetPasswordModal()">❓ Забыли пароль?</a>
                </div>
                
                <button onclick="login()">🚪 Войти</button>
            </div>

            <!-- Форма регистрации -->
            <div id="registerForm" class="form">
                <div id="registerSuccess" class="success-message"></div>
                
                <div class="form-group">
                    <label>👤 ФИО</label>
                    <input type="text" id="regFullName" placeholder="Иванов Иван Иванович">
                    <div id="regFullNameError" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="regEmail" placeholder="example@mail.ru">
                    <div id="regEmailError" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label>📱 Телефон</label>
                    <input type="tel" id="regPhone" placeholder="+7 (999) 123-45-67">
                    <div id="regPhoneError" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label>🎓 Образование</label>
                    <select id="regEducation">
                        <option value="">Выберите образование</option>
                        <option value="высшее">Высшее</option>
                        <option value="среднее-специальное">Среднее специальное</option>
                        <option value="среднее">Среднее</option>
                    </select>
                    <div id="regEducationError" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label>🔒 Пароль</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" placeholder="Минимум 6 символов">
                        <button type="button" class="toggle-password" onclick="togglePassword('regPassword')">👁️</button>
                    </div>
                    <div id="regPasswordError" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label>🔒 Подтверждение пароля</label>
                    <div class="password-wrapper">
                        <input type="password" id="regConfirmPassword" placeholder="Повторите пароль">
                        <button type="button" class="toggle-password" onclick="togglePassword('regConfirmPassword')">👁️</button>
                    </div>
                    <div id="regConfirmError" class="error-message"></div>
                </div>
                
                <button onclick="register()">✅ Зарегистрироваться</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно сброса пароля -->
    <div id="resetModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🔄 Сброс пароля</h3>
                <span class="close" onclick="closeResetModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="resetMessage" class="success-message"></div>
                <div class="form-group">
                    <label>📧 Введите ваш email</label>
                    <input type="email" id="resetEmail" placeholder="example@mail.ru">
                    <div id="resetEmailError" class="error-message"></div>
                </div>
                <p style="font-size: 12px; color: #666; margin-top: 10px;">
                    На указанный email будет отправлена ссылка для сброса пароля
                </p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeResetModal()">Отмена</button>
                <button onclick="resetPassword()">Отправить</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    
    <script>
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input) {
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
            }
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab');
            
            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
            clearErrors();
        }

        function clearErrors() {
            const errors = document.querySelectorAll('.error-message');
            errors.forEach(error => error.style.display = 'none');
        }

        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.style.display = 'block';
                setTimeout(() => {
                    errorElement.style.display = 'none';
                }, 5000);
            }
        }

        function showSuccess(message, elementId) {
            const successElement = document.getElementById(elementId);
            if (successElement) {
                successElement.textContent = message;
                successElement.style.display = 'block';
                setTimeout(() => {
                    successElement.style.display = 'none';
                }, 5000);
            }
        }

        // ========== РЕГИСТРАЦИЯ ==========
        
        async function register() {
            const fullName = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const education = document.getElementById('regEducation').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            // Валидация
            if (!fullName) {
                showError('regFullNameError', 'Введите ФИО');
                return;
            }
            if (!email || !email.includes('@')) {
                showError('regEmailError', 'Введите корректный email');
                return;
            }
            if (!phone) {
                showError('regPhoneError', 'Введите номер телефона');
                return;
            }
            if (!education) {
                showError('regEducationError', 'Выберите образование');
                return;
            }
            if (!password || password.length < 6) {
                showError('regPasswordError', 'Пароль должен быть не менее 6 символов');
                return;
            }
            if (password !== confirmPassword) {
                showError('regConfirmError', 'Пароли не совпадают');
                return;
            }
            
            document.getElementById('loadingIndicator').style.display = 'block';
            
            try {
                // Создаем пользователя в Auth
                const userCredential = await window.auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Отправляем письмо для подтверждения
                await user.sendEmailVerification();
                
                // Создаем документ в Firestore
                await window.db.collection('users').doc(user.uid).set({
                    fullName: fullName,
                    email: email,
                    phone: phone,
                    education: education,
                    role: 'student',
                    emailVerified: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLogin: null,
                    actualAddress: '',
                    registrationAddress: '',
                    passportNumber: '',
                    passportIssuedBy: '',
                    passportIssueDate: '',
                    snils: ''
                });
                
                // Выходим из системы
                await window.auth.signOut();
                
                showSuccess('✅ Регистрация успешна! На ваш email отправлено письмо для подтверждения.', 'registerSuccess');
                
                setTimeout(() => {
                    switchTab('login');
                    document.getElementById('loginEmail').value = email;
                    showSuccess('📧 Подтвердите email и войдите в систему', 'loginSuccess');
                }, 2000);
                
            } catch (error) {
                console.error('Ошибка регистрации:', error);
                if (error.code === 'auth/email-already-in-use') {
                    showError('regEmailError', 'Этот email уже зарегистрирован');
                } else {
                    showError('regEmailError', 'Ошибка: ' + error.message);
                }
            } finally {
                document.getElementById('loadingIndicator').style.display = 'none';
            }
        }

        // ========== ВХОД С ПЕРЕНАПРАВЛЕНИЕМ ПО РОЛИ ==========
        
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showError('loginEmailError', 'Введите email и пароль');
                return;
            }
            
            document.getElementById('loadingIndicator').style.display = 'block';
            
            try {
                // Вход в систему
                const userCredential = await window.auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                console.log('Авторизован пользователь:', user.email);
                
                // Проверка подтверждения email
                if (!user.emailVerified) {
                    await window.auth.signOut();
                    showError('loginEmailError', '⚠️ Пожалуйста, подтвердите email. Проверьте вашу почту.');
                    return;
                }
                
                // Получаем документ пользователя
                const userDoc = await window.db.collection('users').doc(user.uid).get();
                
                let role = 'student';
                
                if (!userDoc.exists) {
                    // Создаем документ если его нет
                    console.log('Документ не найден, создаем...');
                    const defaultData = {
                        fullName: email.split('@')[0],
                        email: email,
                        phone: '',
                        education: '',
                        role: 'student',
                        emailVerified: true,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                        actualAddress: '',
                        registrationAddress: '',
                        passportNumber: '',
                        passportIssuedBy: '',
                        passportIssueDate: '',
                        snils: ''
                    };
                    await window.db.collection('users').doc(user.uid).set(defaultData);
                    role = 'student';
                } else {
                    role = userDoc.data().role || 'student';
                }
                
                // Обновляем время последнего входа
                await window.db.collection('users').doc(user.uid).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                console.log('Роль пользователя:', role);
                
                // Показываем сообщение о перенаправлении
                showSuccess(`🔄 Перенаправление в ${role === 'metodist' ? 'панель методиста' : 'личный кабинет слушателя'}...`, 'loginSuccess');
                
                // Задержка перед перенаправлением для отображения сообщения
                setTimeout(() => {
                    if (role === 'metodist') {
                        console.log('Перенаправление на metodist-cabinet.html');
                        window.location.href = 'metodist-cabinet.html';
                    } else {
                        console.log('Перенаправление на student-cabinet.html');
                        window.location.href = 'student-cabinet.html';
                    }
                }, 1000);
                
            } catch (error) {
                console.error('Ошибка входа:', error);
                if (error.code === 'auth/user-not-found') {
                    showError('loginEmailError', 'Пользователь не найден');
                } else if (error.code === 'auth/wrong-password') {
                    showError('loginPasswordError', 'Неверный пароль');
                } else if (error.code === 'auth/too-many-requests') {
                    showError('loginEmailError', 'Слишком много попыток. Попробуйте позже');
                } else {
                    showError('loginEmailError', 'Ошибка: ' + error.message);
                }
                document.getElementById('loadingIndicator').style.display = 'none';
            }
        }

        // ========== СБРОС ПАРОЛЯ ==========
        
        function showResetPasswordModal() {
            document.getElementById('resetModal').style.display = 'block';
            document.getElementById('resetEmail').value = '';
            document.getElementById('resetMessage').style.display = 'none';
        }

        function closeResetModal() {
            document.getElementById('resetModal').style.display = 'none';
        }

        async function resetPassword() {
            const email = document.getElementById('resetEmail').value.trim();
            
            if (!email) {
                showError('resetEmailError', 'Введите email');
                return;
            }
            
            try {
                await window.auth.sendPasswordResetEmail(email);
                const messageElement = document.getElementById('resetMessage');
                messageElement.textContent = `✅ Ссылка для сброса пароля отправлена на ${email}`;
                messageElement.style.display = 'block';
                
                setTimeout(() => {
                    closeResetModal();
                }, 3000);
                
            } catch (error) {
                console.error('Ошибка сброса пароля:', error);
                if (error.code === 'auth/user-not-found') {
                    showError('resetEmailError', 'Пользователь с таким email не найден');
                } else {
                    showError('resetEmailError', 'Ошибка: ' + error.message);
                }
            }
        }

        // ========== ПРОВЕРКА УЖЕ АВТОРИЗОВАННОГО ПОЛЬЗОВАТЕЛЯ ==========
        
        window.auth.onAuthStateChanged(async (user) => {
            console.log('Auth state changed:', user ? user.email : 'нет пользователя');
            
            if (user && user.emailVerified) {
                // Если пользователь уже авторизован, перенаправляем его
                try {
                    const userDoc = await window.db.collection('users').doc(user.uid).get();
                    let role = 'student';
                    
                    if (userDoc.exists) {
                        role = userDoc.data().role || 'student';
                    }
                    
                    console.log('Автоматическое перенаправление, роль:', role);
                    
                    if (role === 'metodist') {
                        window.location.href = 'metodist-cabinet.html';
                    } else {
                        window.location.href = 'student-cabinet.html';
                    }
                } catch (error) {
                    console.error('Ошибка при авто-перенаправлении:', error);
                }
            }
        });

        // Закрытие модального окна при клике вне его
        window.onclick = function(event) {
            const modal = document.getElementById('resetModal');
            if (event.target === modal) {
                closeResetModal();
            }
        }
    </script>
</body>
</html>
