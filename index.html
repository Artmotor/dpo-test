<!-- index.html - Без CSP для тестирования -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Институт ДПО - Вход</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
    
    <!-- SPA роутинг -->
    <script>
        (function(){
            var redirect = sessionStorage.getItem('redirect');
            if (redirect) {
                sessionStorage.removeItem('redirect');
                if (redirect !== location.href && !redirect.includes('index.html')) {
                    history.replaceState(null, null, redirect);
                }
            }
        })();
    </script>
</head>
<body class="bg-gradient-primary">
    <!-- Анимированный фон -->
    <div class="animated-bg">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-md-5 col-lg-4">
                <!-- Карточка входа -->
                <div class="card auth-card shadow-lg border-0 rounded-4 overflow-hidden">
                    <div class="card-header bg-gradient-primary text-white text-center py-4 border-0">
                        <i class="bi bi-building display-4 mb-2"></i>
                        <h2 class="fw-bold mb-0">Институт ДПО</h2>
                        <p class="text-white-50 mb-0">Дополнительное профессиональное образование</p>
                    </div>
                    
                    <div class="card-body p-4 p-lg-5">
                        <!-- Индикатор ошибки -->
                        <div id="errorAlert" class="alert alert-danger d-none rounded-3" role="alert">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            <span id="errorMessage"></span>
                        </div>
                        
                        <!-- Индикатор успеха -->
                        <div id="successAlert" class="alert alert-success d-none rounded-3" role="alert">
                            <i class="bi bi-check-circle me-2"></i>
                            <span id="successMessage"></span>
                        </div>

                        <!-- Табы входа/регистрации -->
                        <ul class="nav nav-pills nav-fill mb-4" role="tablist">
                            <li class="nav-item">
                                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#login">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Вход
                                </button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#register">
                                    <i class="bi bi-person-plus me-2"></i>Регистрация
                                </button>
                            </li>
                        </ul>

                        <div class="tab-content">
                            <!-- Форма входа -->
                            <div class="tab-pane fade show active" id="login">
                                <form id="loginForm">
                                    <div class="form-floating mb-3">
                                        <input type="email" class="form-control" id="loginEmail" 
                                               placeholder="name@example.com" required autocomplete="email">
                                        <label><i class="bi bi-envelope me-2"></i>Email</label>
                                    </div>
                                    <div class="form-floating mb-4">
                                        <input type="password" class="form-control" id="loginPassword" 
                                               placeholder="Пароль" required autocomplete="current-password">
                                        <label><i class="bi bi-lock me-2"></i>Пароль</label>
                                    </div>
                                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm" id="loginButton">
                                        <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                                    </button>
                                </form>
                            </div>

                            <!-- Форма регистрации -->
                            <div class="tab-pane fade" id="register">
                                <form id="registerForm">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control" id="regFullName" 
                                               placeholder="Иванов Иван Иванович" required autocomplete="name">
                                        <label><i class="bi bi-person me-2"></i>ФИО полностью</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input type="email" class="form-control" id="regEmail" 
                                               placeholder="name@example.com" required autocomplete="email">
                                        <label><i class="bi bi-envelope me-2"></i>Email</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input type="tel" class="form-control" id="regPhone" 
                                               placeholder="+79001234567" required autocomplete="tel">
                                        <label><i class="bi bi-phone me-2"></i>Телефон</label>
                                    </div>
                                    <div class="form-floating mb-4">
                                        <input type="password" class="form-control" id="regPassword" 
                                               placeholder="Пароль (мин. 6 символов)" required minlength="6" autocomplete="new-password">
                                        <label><i class="bi bi-lock me-2"></i>Пароль (мин. 6 символов)</label>
                                    </div>
                                    <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm" id="registerButton">
                                        <i class="bi bi-person-check me-2"></i>Зарегистрироваться
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer bg-light text-center py-3 border-0">
                        <small class="text-muted">
                            <i class="bi bi-shield-check me-1"></i>Защищенное соединение
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Наши скрипты -->
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
