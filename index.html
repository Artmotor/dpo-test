<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Институт ДПО - Личный кабинет слушателя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #f8f9fa;
            border: none;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .form-container {
            padding: 30px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        /* Личный кабинет */
        .cabinet {
            display: none;
        }

        .cabinet.active {
            display: block;
        }

        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .user-info h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .info-item {
            margin-bottom: 10px;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }

        .info-label {
            font-weight: bold;
            color: #555;
        }

        .logout-btn {
            background: #e74c3c;
            margin-top: 10px;
        }

        .logout-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <h1>Институт ДПО</h1>
            <p>Система дистанционного обучения</p>
        </div>

        <!-- Формы авторизации/регистрации -->
        <div id="authForms">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Вход</button>
                <button class="tab" onclick="switchTab('register')">Регистрация</button>
            </div>

            <div class="form-container">
                <!-- Форма входа -->
                <div id="loginForm" class="form active">
                    <div id="loginSuccess" class="success-message"></div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="example@mail.ru">
                        <div id="loginEmailError" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="loginPassword" placeholder="Минимум 6 символов">
                        <div id="loginPasswordError" class="error-message"></div>
                    </div>
                    <button onclick="login()">Войти</button>
                </div>

                <!-- Форма регистрации -->
                <div id="registerForm" class="form">
                    <div id="registerSuccess" class="success-message"></div>
                    <div class="form-group">
                        <label>ФИО</label>
                        <input type="text" id="regFullName" placeholder="Иванов Иван Иванович">
                        <div id="regFullNameError" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="example@mail.ru">
                        <div id="regEmailError" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label>Телефон</label>
                        <input type="tel" id="regPhone" placeholder="+7 (999) 123-45-67">
                        <div id="regPhoneError" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label>Образование</label>
                        <select id="regEducation">
                            <option value="">Выберите образование</option>
                            <option value="высшее">Высшее</option>
                            <option value="среднее-специальное">Среднее специальное</option>
                            <option value="среднее">Среднее</option>
                        </select>
                        <div id="regEducationError" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="regPassword" placeholder="Минимум 6 символов">
                        <div id="regPasswordError" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label>Подтверждение пароля</label>
                        <input type="password" id="regConfirmPassword" placeholder="Повторите пароль">
                        <div id="regConfirmError" class="error-message"></div>
                    </div>
                    <button onclick="register()">Зарегистрироваться</button>
                </div>
            </div>
        </div>

        <!-- Личный кабинет -->
        <div id="userCabinet" class="cabinet">
            <div class="form-container">
                <div class="user-info" id="userInfo">
                    <h3>Личный кабинет слушателя</h3>
                    <div id="userDetails"></div>
                </div>
                <button class="logout-btn" onclick="logout()">Выйти из системы</button>
            </div>
        </div>
    </div>

    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Ваш конфиг Firebase -->
    <script src="firebase-config.js"></script>
    
    <script>
        // Функция для переключения между вкладками
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab');
            
            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
            
            // Очищаем ошибки
            clearErrors();
        }
        
        // Очистка ошибок
        function clearErrors() {
            const errors = document.querySelectorAll('.error-message');
            errors.forEach(error => error.style.display = 'none');
        }
        
        // Показ ошибки
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }
        }
        
        // Показ успешного сообщения
        function showSuccess(message, formType) {
            const successElement = document.getElementById(`${formType}Success`);
            if (successElement) {
                successElement.textContent = message;
                successElement.style.display = 'block';
                setTimeout(() => {
                    successElement.style.display = 'none';
                }, 3000);
            }
        }
        
        // Регистрация слушателя
        async function register() {
            const fullName = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const education = document.getElementById('regEducation').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            // Валидация
            let isValid = true;
            
            if (!fullName) {
                showError('regFullNameError', 'Введите ФИО');
                isValid = false;
            }
            
            if (!email || !email.includes('@')) {
                showError('regEmailError', 'Введите корректный email');
                isValid = false;
            }
            
            if (!phone) {
                showError('regPhoneError', 'Введите номер телефона');
                isValid = false;
            }
            
            if (!education) {
                showError('regEducationError', 'Выберите образование');
                isValid = false;
            }
            
            if (!password || password.length < 6) {
                showError('regPasswordError', 'Пароль должен содержать минимум 6 символов');
                isValid = false;
            }
            
            if (password !== confirmPassword) {
                showError('regConfirmError', 'Пароли не совпадают');
                isValid = false;
            }
            
            if (!isValid) return;
            
            try {
                // Регистрация в Firebase Auth
                const userCredential = await window.auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Сохраняем дополнительные данные в Firestore
                await window.db.collection('listeners').doc(user.uid).set({
                    fullName: fullName,
                    email: email,
                    phone: phone,
                    education: education,
                    role: 'student',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    courses: []
                });
                
                showSuccess('Регистрация успешна! Выполняется вход...', 'register');
                
                setTimeout(() => {
                    loadUserCabinet(user.uid);
                }, 1000);
                
            } catch (error) {
                console.error('Ошибка регистрации:', error);
                if (error.code === 'auth/email-already-in-use') {
                    showError('regEmailError', 'Этот email уже зарегистрирован');
                } else {
                    showError('regEmailError', 'Ошибка: ' + error.message);
                }
            }
        }
        
        // Вход в систему
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showError('loginEmailError', 'Введите email и пароль');
                return;
            }
            
            try {
                const userCredential = await window.auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Обновляем время последнего входа
                await window.db.collection('listeners').doc(user.uid).update({
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showSuccess('Вход выполнен успешно!', 'login');
                
                setTimeout(() => {
                    loadUserCabinet(user.uid);
                }, 1000);
                
            } catch (error) {
                console.error('Ошибка входа:', error);
                if (error.code === 'auth/user-not-found') {
                    showError('loginEmailError', 'Пользователь не найден');
                } else if (error.code === 'auth/wrong-password') {
                    showError('loginPasswordError', 'Неверный пароль');
                } else {
                    showError('loginEmailError', 'Ошибка: ' + error.message);
                }
            }
        }
        
        // Загрузка личного кабинета
        async function loadUserCabinet(userId) {
            try {
                const doc = await window.db.collection('listeners').doc(userId).get();
                
                if (doc.exists) {
                    const userData = doc.data();
                    
                    // Скрываем формы и показываем кабинет
                    document.getElementById('authForms').style.display = 'none';
                    document.getElementById('userCabinet').classList.add('active');
                    
                    // Отображаем информацию
                    const userDetails = document.getElementById('userDetails');
                    userDetails.innerHTML = `
                        <div class="info-item">
                            <span class="info-label">ФИО:</span> ${userData.fullName}
                        </div>
                        <div class="info-item">
                            <span class="info-label">Email:</span> ${userData.email}
                        </div>
                        <div class="info-item">
                            <span class="info-label">Телефон:</span> ${userData.phone}
                        </div>
                        <div class="info-item">
                            <span class="info-label">Образование:</span> ${userData.education}
                        </div>
                        <div class="info-item">
                            <span class="info-label">Статус:</span> Слушатель ИДПО
                        </div>
                        <div class="info-item">
                            <span class="info-label">Дата регистрации:</span> ${userData.createdAt ? new Date(userData.createdAt.toDate()).toLocaleDateString() : 'Не указана'}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                alert('Ошибка загрузки данных пользователя');
            }
        }
        
        // Выход из системы
        async function logout() {
            try {
                await window.auth.signOut();
                
                // Показываем формы и скрываем кабинет
                document.getElementById('authForms').style.display = 'block';
                document.getElementById('userCabinet').classList.remove('active');
                
                // Очищаем поля
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
                
                console.log('Выход выполнен успешно');
            } catch (error) {
                console.error('Ошибка выхода:', error);
                alert('Ошибка при выходе из системы');
            }
        }
        
        // Проверяем, есть ли уже авторизованный пользователь
        window.auth.onAuthStateChanged((user) => {
            if (user) {
                loadUserCabinet(user.uid);
            } else {
                document.getElementById('authForms').style.display = 'block';
                document.getElementById('userCabinet').classList.remove('active');
            }
        });
    </script>
</body>
</html>
