<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Институт ДПО - Вход в систему</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #f8f9fa;
            border: none;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .form-container {
            padding: 30px;
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            color: #667eea;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .forgot-password {
            text-align: right;
            margin-top: 10px;
        }

        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .success-message, .info-message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.5s;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
        }

        .info-message {
            background: #d1ecf1;
            color: #0c5460;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 0;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }

        .modal-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px 10px 0 0;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 20px;
            text-align: right;
            border-top: 1px solid #eee;
        }

        .close {
            color: white;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-secondary {
            background: #6c757d;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Институт ДПО</h1>
            <p>Система дистанционного обучения</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Вход</button>
            <button class="tab" onclick="switchTab('register')">Регистрация</button>
        </div>

        <div class="form-container">
            <!-- Форма входа -->
            <div id="loginForm" class="form active">
                <div id="loginSuccess" class="success-message"></div>
                <div id="loginInfo" class="info-message"></div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="example@mail.ru">
                    <div id="loginEmailError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Введите пароль">
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">👁️</button>
                    </div>
                    <div id="loginPasswordError" class="error-message"></div>
                </div>
                <div class="forgot-password">
                    <a onclick="showResetPasswordModal()">Забыли пароль?</a>
                </div>
                <button onclick="login()">Войти</button>
            </div>

            <!-- Форма регистрации -->
            <div id="registerForm" class="form">
                <div id="registerSuccess" class="success-message"></div>
                <div class="form-group">
                    <label>ФИО</label>
                    <input type="text" id="regFullName">
                    <div id="regFullNameError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail">
                    <div id="regEmailError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" id="regPhone">
                    <div id="regPhoneError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label>Образование</label>
                    <select id="regEducation">
                        <option value="">Выберите образование</option>
                        <option value="высшее">Высшее</option>
                        <option value="среднее-специальное">Среднее специальное</option>
                        <option value="среднее">Среднее</option>
                    </select>
                    <div id="regEducationError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword">
                        <button type="button" class="toggle-password" onclick="togglePassword('regPassword')">👁️</button>
                    </div>
                    <div id="regPasswordError" class="error-message"></div>
                </div>
                <div class="form-group">
                    <label>Подтверждение пароля</label>
                    <div class="password-wrapper">
                        <input type="password" id="regConfirmPassword">
                        <button type="button" class="toggle-password" onclick="togglePassword('regConfirmPassword')">👁️</button>
                    </div>
                    <div id="regConfirmError" class="error-message"></div>
                </div>
                <button onclick="register()">Зарегистрироваться</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно сброса пароля -->
    <div id="resetModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="closeResetModal()">&times;</span>
                <h3>Сброс пароля</h3>
            </div>
            <div class="modal-body">
                <div id="resetMessage" class="success-message"></div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="resetEmail">
                    <div id="resetEmailError" class="error-message"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeResetModal()">Отмена</button>
                <button onclick="resetPassword()">Отправить</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="common.js"></script>
    
    <script>
        let currentUser = null;

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab');
            
            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        async function register() {
            const fullName = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const education = document.getElementById('regEducation').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            if (!fullName || !email || !phone || !education || !password) {
                alert('Заполните все поля');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('Пароли не совпадают');
                return;
            }
            
            if (password.length < 6) {
                alert('Пароль должен быть не менее 6 символов');
                return;
            }
            
            try {
                const userCredential = await window.auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                await user.sendEmailVerification();
                
                // Сохраняем пользователя с ролью "student"
                await window.db.collection('users').doc(user.uid).set({
                    fullName: fullName,
                    email: email,
                    phone: phone,
                    education: education,
                    role: 'student',
                    emailVerified: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    // Дополнительные поля для слушателя
                    actualAddress: '',
                    registrationAddress: '',
                    passportNumber: '',
                    passportIssuedBy: '',
                    passportIssueDate: '',
                    snils: ''
                });
                
                await window.auth.signOut();
                alert('Регистрация успешна! Подтвердите email и войдите в систему.');
                switchTab('login');
                document.getElementById('loginEmail').value = email;
                
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                alert('Введите email и пароль');
                return;
            }
            
            try {
                const userCredential = await window.auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                if (!user.emailVerified) {
                    await window.auth.signOut();
                    alert('Подтвердите email перед входом');
                    return;
                }
                
                const userDoc = await window.db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                if (userData.role === 'student') {
                    window.location.href = 'student-cabinet.html';
                } else if (userData.role === 'metodist') {
                    window.location.href = 'metodist-cabinet.html';
                } else {
                    alert('Неизвестная роль пользователя');
                }
                
            } catch (error) {
                alert('Ошибка входа: ' + error.message);
            }
        }

        function showResetPasswordModal() {
            document.getElementById('resetModal').style.display = 'block';
        }

        function closeResetModal() {
            document.getElementById('resetModal').style.display = 'none';
        }

        async function resetPassword() {
            const email = document.getElementById('resetEmail').value.trim();
            if (!email) {
                alert('Введите email');
                return;
            }
            
            try {
                await window.auth.sendPasswordResetEmail(email);
                alert('Ссылка для сброса пароля отправлена на email');
                closeResetModal();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        window.onclick = function(event) {
            const modal = document.getElementById('resetModal');
            if (event.target === modal) {
                closeResetModal();
            }
        }
    </script>
</body>
</html>
