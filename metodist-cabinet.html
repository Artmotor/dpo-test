<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель методиста - Управление всеми полями</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2c5f2d;
            --primary-dark: #1e3a1f;
            --secondary: #ffc107;
            --danger: #dc3545;
            --success: #28a745;
            --warning: #ff9800;
            --info: #17a2b8;
            --gray-light: #f5f5f5;
            --gray: #ddd;
            --dark: #333;
            --white: #fff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --radius: 16px;
            --radius-sm: 10px;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 36px; background: var(--secondary); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .header h1 { font-size: clamp(18px, 5vw, 24px); }
        .user-name { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; }
        .btn-logout { background: var(--danger); color: white; border: none; padding: 10px 24px; border-radius: 10px; cursor: pointer; }
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        
        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-number { font-size: 32px; font-weight: bold; color: var(--primary); }
        
        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: white;
            padding: 10px;
            border-radius: 16px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 24px;
            background: #f5f5f5;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 16px;
            animation: fadeIn 0.3s;
        }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Категории полей */
        .category-section {
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
        }
        .category-header {
            background: var(--gray-light);
            padding: 15px 20px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-body {
            padding: 20px;
        }
        .fields-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
        }
        .field-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border-left: 3px solid var(--primary);
            transition: all 0.3s;
        }
        .field-card:hover { transform: translateX(5px); box-shadow: var(--shadow); }
        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .field-label {
            font-weight: bold;
            font-size: 16px;
        }
        .field-id {
            font-family: monospace;
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        .field-semantics {
            font-size: 11px;
            color: var(--info);
            margin-top: 5px;
            word-break: break-all;
        }
        .field-semantics a { color: var(--info); text-decoration: none; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 500;
        }
        .badge-required { background: #dc3545; color: white; }
        .badge-optional { background: #28a745; color: white; }
        .badge-active { background: #28a745; color: white; }
        .badge-inactive { background: #dc3545; color: white; }
        
        .edit-btn-small {
            background: var(--primary);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: white;
            margin: 3% auto;
            border-radius: 16px;
            width: 90%;
            max-width: 650px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 20px;
            background: var(--primary);
            color: white;
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }
        .modal-header .close { font-size: 28px; cursor: pointer; }
        .modal-body { padding: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .save-btn { background: var(--success); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; flex: 1; }
        .cancel-btn { background: var(--secondary); border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; flex: 1; }
        
        .toast-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            z-index: 1001;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .toast-success { background: var(--success); color: white; }
        .toast-error { background: var(--danger); color: white; }
        
        @media (max-width: 768px) {
            .fields-grid { grid-template-columns: 1fr; }
            .tabs { flex-direction: column; }
            .tab-btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📚</div>
        <h1>Институт ДПО - Управление всеми полями</h1>
        <div><span class="user-name" id="userName">Загрузка...</span> <button class="btn-logout" onclick="logout()">🚪 Выйти</button></div>
    </div>

    <div class="container">
        <div id="toastSuccess" class="toast-message toast-success"></div>
        <div id="toastError" class="toast-message toast-error"></div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalFields">0</div><div>Всего полей</div></div>
            <div class="stat-card"><div class="stat-number" id="activeFields">0</div><div>Активных</div></div>
            <div class="stat-card"><div class="stat-number" id="requiredFields">0</div><div>Обязательных</div></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('all')">📋 Все поля</button>
            <button class="tab-btn" onclick="switchTab('profile')">👤 Личные данные</button>
            <button class="tab-btn" onclick="switchTab('documents')">📄 Паспортные данные</button>
            <button class="tab-btn" onclick="switchTab('address')">🏠 Адреса</button>
            <button class="tab-btn" onclick="switchTab('custom')">⭐ Дополнительные поля</button>
        </div>

        <!-- Контейнер для всех категорий -->
        <div id="allTab" class="tab-content active">
            <div id="allFieldsContainer"></div>
        </div>
        <div id="profileTab" class="tab-content"><div id="profileFieldsContainer"></div></div>
        <div id="documentsTab" class="tab-content"><div id="documentsFieldsContainer"></div></div>
        <div id="addressTab" class="tab-content"><div id="addressFieldsContainer"></div></div>
        <div id="customTab" class="tab-content"><div id="customFieldsContainer"></div></div>
    </div>

    <!-- Модальное окно редактирования поля -->
    <div id="fieldEditorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">✏️ Редактирование поля</h3>
                <span class="close" onclick="closeFieldEditor()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>ID поля *</label>
                    <input type="text" id="editFieldId" placeholder="unique_field_id">
                    <small>Технический идентификатор (латиница, цифры, _)</small>
                </div>
                <div class="form-group">
                    <label>Название поля *</label>
                    <input type="text" id="editFieldLabel" placeholder="Отображаемое название">
                </div>
                <div class="form-group">
                    <label>Семантика (URL схемы)</label>
                    <input type="url" id="editFieldSemantics" placeholder="https://schema.org/...">
                    <small>Ссылка на стандарт, ГОСТ, схему данных</small>
                </div>
                <div class="form-group">
                    <label>Placeholder (подсказка)</label>
                    <input type="text" id="editFieldPlaceholder" placeholder="Пример ввода...">
                </div>
                <div class="form-group">
                    <label>Порядок отображения</label>
                    <input type="number" id="editFieldOrder" value="0">
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="editFieldRequired"> Обязательное поле</label>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="editFieldActive" checked> Активно (видно пользователям)</label>
                </div>
                <div class="form-actions">
                    <button class="save-btn" onclick="saveField()">💾 Сохранить</button>
                    <button class="cancel-btn" onclick="closeFieldEditor()">❌ Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // Системные поля по умолчанию
        const DEFAULT_SYSTEM_FIELDS = {
            // Личные данные (profile)
            fullName: { id: 'fullName', label: 'ФИО', category: 'profile', isRequired: true, isActive: true, semantics: 'https://schema.org/name', placeholder: 'Иванов Иван Иванович', order: 1 },
            phone: { id: 'phone', label: 'Телефон', category: 'profile', isRequired: false, isActive: true, semantics: 'https://schema.org/telephone', placeholder: '+7 (XXX) XXX-XX-XX', order: 2 },
            email: { id: 'email', label: 'Email', category: 'profile', isRequired: true, isActive: true, semantics: 'https://schema.org/email', placeholder: 'example@mail.ru', order: 3 },
            education: { id: 'education', label: 'Образование', category: 'profile', isRequired: false, isActive: true, semantics: 'https://schema.org/educationalCredential', placeholder: 'Высшее', order: 4 },
            
            // Паспортные данные (documents)
            passportNumber: { id: 'passportNumber', label: 'Номер паспорта', category: 'documents', isRequired: false, isActive: true, semantics: 'https://schema.org/passportNumber', placeholder: 'Серия и номер', order: 5 },
            passportIssuedBy: { id: 'passportIssuedBy', label: 'Кем выдан', category: 'documents', isRequired: false, isActive: true, semantics: 'https://schema.org/issuingAuthority', placeholder: 'Отделение МВД', order: 6 },
            passportIssueDate: { id: 'passportIssueDate', label: 'Дата выдачи', category: 'documents', isRequired: false, isActive: true, semantics: 'https://schema.org/dateIssued', placeholder: '2020-01-01', order: 7 },
            snils: { id: 'snils', label: 'СНИЛС', category: 'documents', isRequired: false, isActive: true, semantics: 'https://schema.org/snils', placeholder: '000-000-000 00', order: 8 },
            
            // Адреса (address)
            registrationAddress: { id: 'registrationAddress', label: 'Адрес регистрации', category: 'address', isRequired: false, isActive: true, semantics: 'https://schema.org/address', placeholder: 'г. Москва, ул. Примерная, д.1', order: 9 },
            actualAddress: { id: 'actualAddress', label: 'Фактический адрес', category: 'address', isRequired: false, isActive: true, semantics: 'https://schema.org/address', placeholder: 'г. Москва, ул. Примерная, д.1', order: 10 }
        };

        let allFields = [];
        let currentEditField = null;

        function showToast(message, type) {
            const toast = document.getElementById(`toast${type.charAt(0).toUpperCase() + type.slice(1)}`);
            if (toast) {
                toast.textContent = message;
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 3000);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        // Инициализация системных полей (только при первом запуске)
        async function initSystemFields() {
            console.log('🔧 Инициализация системных полей...');
            
            for (const [id, field] of Object.entries(DEFAULT_SYSTEM_FIELDS)) {
                const doc = await window.db.collection('system_fields').doc(id).get();
                if (!doc.exists) {
                    await window.db.collection('system_fields').doc(id).set({
                        ...field,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    console.log(`✅ Создано системное поле: ${id}`);
                }
            }
        }

        // Загрузка всех полей (системные + пользовательские)
        async function loadAllFields() {
            try {
                // Загружаем системные поля
                const systemSnapshot = await window.db.collection('system_fields').get();
                const systemFields = [];
                systemSnapshot.forEach(doc => systemFields.push({ id: doc.id, ...doc.data(), isSystem: true }));
                
                // Загружаем пользовательские (дополнительные) поля
                const customSnapshot = await window.db.collection('custom_fields').get();
                const customFields = [];
                customSnapshot.forEach(doc => customFields.push({ id: doc.id, ...doc.data(), isSystem: false }));
                
                allFields = [...systemFields, ...customFields];
                allFields.sort((a, b) => (a.order || 0) - (b.order || 0));
                
                // Обновляем статистику
                document.getElementById('totalFields').textContent = allFields.length;
                document.getElementById('activeFields').textContent = allFields.filter(f => f.isActive !== false).length;
                document.getElementById('requiredFields').textContent = allFields.filter(f => f.isRequired).length;
                
                // Отображаем по категориям
                displayFieldsByCategory();
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                showToast('Ошибка загрузки полей', 'error');
            }
        }

        // Отображение полей по категориям
        function displayFieldsByCategory() {
            const categories = [
                { id: 'profile', name: '👤 Личные данные', container: 'profileFieldsContainer' },
                { id: 'documents', name: '📄 Паспортные данные', container: 'documentsFieldsContainer' },
                { id: 'address', name: '🏠 Адреса', container: 'addressFieldsContainer' },
                { id: 'custom', name: '⭐ Дополнительные поля', container: 'customFieldsContainer' }
            ];
            
            // Сортируем поля по категориям
            const fieldsByCategory = {
                profile: allFields.filter(f => f.category === 'profile'),
                documents: allFields.filter(f => f.category === 'documents'),
                address: allFields.filter(f => f.category === 'address'),
                custom: allFields.filter(f => f.category === 'custom' || (!f.category && !f.isSystem))
            };
            
            // Заполняем контейнеры
            for (const cat of categories) {
                const container = document.getElementById(cat.container);
                if (container) {
                    container.innerHTML = renderFieldsList(fieldsByCategory[cat.id] || [], cat.name);
                }
            }
            
            // Все поля вместе
            const allContainer = document.getElementById('allFieldsContainer');
            if (allContainer) {
                let allHtml = '';
                for (const cat of categories) {
                    allHtml += renderFieldsList(fieldsByCategory[cat.id] || [], cat.name);
                }
                allContainer.innerHTML = allHtml;
            }
        }

        function renderFieldsList(fields, categoryName) {
            if (fields.length === 0) {
                return `<div style="padding:20px; text-align:center; color:#999;">📭 Нет полей в категории "${categoryName}"</div>`;
            }
            
            return `
                <div class="category-section">
                    <div class="category-header">
                        <span>${categoryName}</span>
                        <span style="font-size:12px;">${fields.length} полей</span>
                    </div>
                    <div class="category-body">
                        <div class="fields-grid">
                            ${fields.map(field => `
                                <div class="field-card">
                                    <div class="field-header">
                                        <span class="field-label">${escapeHtml(field.label)}</span>
                                        <button class="edit-btn-small" onclick="openFieldEditor('${field.id}')">✏️</button>
                                    </div>
                                    <div><span class="field-id">ID: ${escapeHtml(field.id)}</span></div>
                                    <div>
                                        ${field.isRequired ? '<span class="badge badge-required">Обязательное</span>' : '<span class="badge badge-optional">Необязательное</span>'}
                                        ${field.isActive !== false ? '<span class="badge badge-active">Активно</span>' : '<span class="badge badge-inactive">Отключено</span>'}
                                        ${field.isSystem ? '<span class="badge" style="background:#6c757d; color:white;">Системное</span>' : '<span class="badge" style="background:#17a2b8; color:white;">Пользовательское</span>'}
                                    </div>
                                    ${field.semantics ? `<div class="field-semantics">🔗 <a href="${escapeHtml(field.semantics)}" target="_blank">${escapeHtml(field.semantics)}</a></div>` : ''}
                                    ${field.placeholder ? `<div style="font-size:11px; color:#666; margin-top:5px;">💡 ${escapeHtml(field.placeholder)}</div>` : ''}
                                    <div style="font-size:10px; color:#999; margin-top:5px;">Порядок: ${field.order || 0}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        // Открытие редактора поля
        async function openFieldEditor(fieldId) {
            const field = allFields.find(f => f.id === fieldId);
            if (!field) return;
            
            currentEditField = field;
            
            document.getElementById('modalTitle').textContent = `✏️ Редактирование поля: ${field.label}`;
            document.getElementById('editFieldId').value = field.id;
            document.getElementById('editFieldLabel').value = field.label || '';
            document.getElementById('editFieldSemantics').value = field.semantics || '';
            document.getElementById('editFieldPlaceholder').value = field.placeholder || '';
            document.getElementById('editFieldOrder').value = field.order || 0;
            document.getElementById('editFieldRequired').checked = field.isRequired || false;
            document.getElementById('editFieldActive').checked = field.isActive !== false;
            
            // Для системных полей ID можно менять, но с предупреждением
            if (field.isSystem) {
                const idInput = document.getElementById('editFieldId');
                idInput.disabled = false;
                const hint = document.createElement('small');
                hint.id = 'systemFieldHint';
                hint.style.display = 'block';
                hint.style.color = '#ff9800';
                hint.style.marginTop = '5px';
                hint.innerHTML = '⚠️ Это системное поле. Изменение ID потребует обновления кода!';
                if (!document.getElementById('systemFieldHint')) {
                    idInput.parentElement.appendChild(hint);
                }
            } else {
                document.getElementById('editFieldId').disabled = false;
                const existingHint = document.getElementById('systemFieldHint');
                if (existingHint) existingHint.remove();
            }
            
            document.getElementById('fieldEditorModal').style.display = 'block';
        }

        function closeFieldEditor() {
            document.getElementById('fieldEditorModal').style.display = 'none';
            currentEditField = null;
        }

        // Сохранение поля (с поддержкой смены ID)
        async function saveField() {
            const newId = document.getElementById('editFieldId').value.trim();
            const newLabel = document.getElementById('editFieldLabel').value.trim();
            const newSemantics = document.getElementById('editFieldSemantics').value.trim();
            const newPlaceholder = document.getElementById('editFieldPlaceholder').value.trim();
            const newOrder = parseInt(document.getElementById('editFieldOrder').value) || 0;
            const newRequired = document.getElementById('editFieldRequired').checked;
            const newActive = document.getElementById('editFieldActive').checked;
            
            if (!newId || !newLabel) {
                showToast('Заполните ID и название поля', 'error');
                return;
            }
            
            if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(newId)) {
                showToast('ID должен содержать только латиницу, цифры и _, начинаться с буквы', 'error');
                return;
            }
            
            const oldId = currentEditField.id;
            const isSystem = currentEditField.isSystem;
            const collection = isSystem ? 'system_fields' : 'custom_fields';
            
            try {
                // Если ID изменился
                if (oldId !== newId) {
                    // Проверяем, не занят ли новый ID
                    const existingCheck = await window.db.collection(collection).doc(newId).get();
                    if (existingCheck.exists) {
                        showToast(`ID "${newId}" уже существует`, 'error');
                        return;
                    }
                    
                    if (isSystem) {
                        showToast('⚠️ Внимание! Изменение ID системного поля может нарушить работу сервиса. Продолжить?', 'warning');
                        if (!confirm('Вы уверены, что хотите изменить ID системного поля? Это потребует обновления кода!')) return;
                    }
                    
                    // Создаем поле с новым ID
                    const newFieldData = {
                        ...currentEditField,
                        id: newId,
                        label: newLabel,
                        semantics: newSemantics,
                        placeholder: newPlaceholder,
                        order: newOrder,
                        isRequired: newRequired,
                        isActive: newActive,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    delete newFieldData.id;
                    
                    await window.db.collection(collection).doc(newId).set(newFieldData);
                    
                    // Мигрируем данные у слушателей
                    await migrateFieldData(oldId, newId, isSystem);
                    
                    // Удаляем старое поле
                    await window.db.collection(collection).doc(oldId).delete();
                    
                    showToast(`✅ Поле переименовано! ${oldId} → ${newId}`, 'success');
                } else {
                    // Обычное обновление
                    const updateData = {
                        label: newLabel,
                        semantics: newSemantics,
                        placeholder: newPlaceholder,
                        order: newOrder,
                        isRequired: newRequired,
                        isActive: newActive,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await window.db.collection(collection).doc(oldId).update(updateData);
                    showToast('✅ Поле обновлено!', 'success');
                }
                
                closeFieldEditor();
                await loadAllFields();
                
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                showToast('❌ Ошибка: ' + error.message, 'error');
            }
        }

        // Миграция данных слушателей при смене ID поля
        async function migrateFieldData(oldId, newId, isSystem) {
            console.log(`🔄 Миграция данных: ${oldId} → ${newId}`);
            
            const studentsSnapshot = await window.db.collection('users')
                .where('role', '==', 'student')
                .get();
            
            const updatePromises = [];
            let count = 0;
            
            for (const doc of studentsSnapshot.docs) {
                const userData = doc.data();
                let needUpdate = false;
                let updatedData = {};
                
                // Для системных полей (хранятся в корне документа)
                if (isSystem && userData[oldId] !== undefined) {
                    updatedData[newId] = userData[oldId];
                    updatedData[oldId] = firebase.firestore.FieldValue.delete();
                    needUpdate = true;
                    count++;
                }
                
                // Для пользовательских полей (хранятся в customFields)
                if (!isSystem && userData.customFields && userData.customFields[oldId] !== undefined) {
                    const newCustomFields = { ...userData.customFields };
                    newCustomFields[newId] = newCustomFields[oldId];
                    delete newCustomFields[oldId];
                    updatedData.customFields = newCustomFields;
                    needUpdate = true;
                    count++;
                }
                
                if (needUpdate) {
                    updatePromises.push(window.db.collection('users').doc(doc.id).update(updatedData));
                }
            }
            
            if (updatePromises.length) {
                await Promise.all(updatePromises);
                console.log(`✅ Перенесено ${count} записей`);
            }
            
            return count;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${tabName}Tab`).classList.add('active');
            if (event && event.target) event.target.classList.add('active');
        }

        async function logout() {
            await window.auth.signOut();
            window.location.href = 'index.html';
        }

        // Инициализация
        window.auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            
            try {
                const userDoc = await window.db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                if (userData.role !== 'metodist' && userData.role !== 'admin') {
                    window.location.href = 'index.html';
                    return;
                }
                
                document.getElementById('userName').textContent = userData.fullName || userData.email;
                
                await initSystemFields();
                await loadAllFields();
                
            } catch(e) {
                console.error(e);
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
