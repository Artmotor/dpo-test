<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель методиста - Институт ДПО</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #e8f5e9; min-height: 100vh; }
        .header { background: #2c5f2d; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 32px; }
        .btn-logout { background: #dc3545; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 16px; text-align: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-number { font-size: 32px; font-weight: bold; color: #2c5f2d; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 12px 24px; background: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .tab.active { background: #2c5f2d; color: white; }
        .tab-content { display: none; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #28a745; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-edit { background: #2c5f2d; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; }
        tr:hover { background: #f9f9f9; }
        .action-btns { display: flex; gap: 5px; }
        .status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .status-verified { background: #d4edda; color: #155724; }
        .status-unverified { background: #fff3cd; color: #856404; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; margin: 5% auto; padding: 0; width: 90%; max-width: 600px; border-radius: 16px; max-height: 85vh; overflow-y: auto; }
        .modal-header { background: #2c5f2d; color: white; padding: 15px 20px; display: flex; justify-content: space-between; border-radius: 16px 16px 0 0; }
        .modal-body { padding: 20px; }
        .close { font-size: 24px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; display: none; z-index: 1100; }
        .toast-success { background: #28a745; color: white; }
        .toast-error { background: #dc3545; color: white; }
        .toast-info { background: #17a2b8; color: white; }
        .loading { text-align: center; padding: 40px; color: #666; }
        @media (max-width: 768px) {
            .stats { grid-template-columns: 1fr; }
            .tabs { flex-direction: column; }
            .action-btns { flex-direction: column; }
            table { font-size: 14px; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📚 Институт ДПО - Панель методиста</div>
        <div><span id="userName" style="margin-right:15px">Загрузка...</span><button class="btn-logout" id="logoutBtn">🚪 Выйти</button></div>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card" data-tab="students"><div class="stat-number" id="totalStudents">0</div><div>Всего слушателей</div></div>
            <div class="stat-card" data-tab="students"><div class="stat-number" id="verifiedStudents">0</div><div>Подтвердили email</div></div>
            <div class="stat-card" data-tab="students"><div class="stat-number" id="unverifiedStudents">0</div><div>Не подтвердили</div></div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="students">👥 Слушатели</button>
            <button class="tab" data-tab="create">➕ Создать слушателя</button>
            <button class="tab" data-tab="import">📊 Импорт/Экспорт</button>
        </div>

        <div id="studentsTab" class="tab-content active">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск по ФИО, email или телефону...">
                <button class="btn-primary" id="exportBtn">📥 Экспорт в Excel</button>
            </div>
            <div style="overflow-x: auto">
                <table id="studentsTable">
                    <thead><tr><th>ФИО</th><th>Email</th><th>Телефон</th><th>Образование</th><th>Статус</th><th>Действия</th></tr></thead>
                    <tbody id="studentsList"><tr><td colspan="6" class="loading">Загрузка...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="createTab" class="tab-content">
            <h3>➕ Создание слушателя</h3>
            <p style="color:#666; margin-bottom:15px">На email будет отправлено письмо с подтверждением.</p>
            <div class="form-group"><label>ФИО *</label><input type="text" id="newName" placeholder="Иванов Иван Иванович"></div>
            <div class="form-group"><label>Email *</label><input type="email" id="newEmail" placeholder="student@example.com"></div>
            <div class="form-group"><label>Телефон</label><input type="tel" id="newPhone" placeholder="+7 (XXX) XXX-XX-XX"></div>
            <div class="form-group"><label>Образование</label><select id="newEducation"><option value="">-- Выберите --</option><option value="высшее">Высшее</option><option value="среднее-специальное">Среднее специальное</option><option value="среднее">Среднее</option></select></div>
            <div class="form-group"><label>Пароль</label><input type="text" id="newPassword" value="student123"></div>
            <button class="btn-primary" id="createBtn">✅ Создать слушателя</button>
        </div>

        <div id="importTab" class="tab-content">
            <div style="display:flex; gap:20px; flex-wrap:wrap">
                <div style="flex:1"><h3>📥 Экспорт</h3><button class="btn-primary" id="exportXlsxBtn">📥 Экспорт в Excel</button></div>
                <div style="flex:1"><h3>📤 Импорт из Excel</h3><input type="file" id="importFile" accept=".xlsx,.xls" style="margin:10px 0"><button class="btn-info" id="previewBtn">👁️ Предпросмотр</button><div id="preview" style="margin-top:15px"></div></div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>✏️ Редактирование слушателя</h3><span class="close" id="closeModal">&times;</span></div>
            <div class="modal-body" id="editForm"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        // Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyC9Gp359H5gVRE6DpDUp1md9o2uu1c5A7k",
            authDomain: "vgau-lk.firebaseapp.com",
            projectId: "vgau-lk",
            storageBucket: "vgau-lk.firebasestorage.app",
            messagingSenderId: "832671757947",
            appId: "1:832671757947:web:07a01204dffefc30b2d4de"
        };

        // Инициализация Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Глобальные переменные
        let allStudents = [];
        let currentEditId = null;
        let importData = [];

        // Показ уведомления
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // Экранирование HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        // Формат даты
        function formatDate(ts) {
            if (!ts) return '—';
            try {
                const d = ts.toDate ? ts.toDate() : new Date(ts);
                return d.toLocaleDateString('ru-RU');
            } catch(e) { return '—'; }
        }

        // Переключение вкладок
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`${tabName}Tab`).classList.add('active');
            document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
            if (tabName === 'students') loadStudents();
        }

        // Загрузка списка слушателей
        async function loadStudents() {
            try {
                document.getElementById('studentsList').innerHTML = '<tr><td colspan="6" class="loading">Загрузка...</td></tr>';
                
                const snapshot = await db.collection('users').where('role', '==', 'student').orderBy('createdAt', 'desc').get();
                allStudents = [];
                snapshot.forEach(doc => allStudents.push({ id: doc.id, ...doc.data() }));
                
                renderStudents(allStudents);
                updateStats();
            } catch (err) {
                console.error(err);
                document.getElementById('studentsList').innerHTML = '<tr><td colspan="6" style="color:red;text-align:center">Ошибка загрузки</td></tr>';
                showToast('Ошибка загрузки: ' + err.message, 'error');
            }
        }

        // Отображение списка
        function renderStudents(students) {
            const tbody = document.getElementById('studentsList');
            if (!students.length) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Нет слушателей</td></tr>';
                return;
            }
            tbody.innerHTML = students.map(s => `
                <tr>
                    <td>${escapeHtml(s.fullName || '—')}</td>
                    <td>${escapeHtml(s.email)}</td>
                    <td>${escapeHtml(s.phone || '—')}</td>
                    <td>${escapeHtml(s.education || '—')}</td>
                    <td><span class="status ${s.emailVerified ? 'status-verified' : 'status-unverified'}">${s.emailVerified ? '✅ Подтвержден' : '⏳ Не подтвержден'}</span></td>
                    <td class="action-btns">
                        <button class="btn-edit" onclick="openEditModal('${s.id}')">✏️</button>
                        <button class="btn-danger" onclick="deleteStudent('${s.id}')">🗑️</button>
                        ${!s.emailVerified ? `<button class="btn-info" onclick="resendEmail('${s.id}')">📧</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        // Поиск
        function searchStudents() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            if (!term) return renderStudents(allStudents);
            const filtered = allStudents.filter(s => 
                (s.fullName?.toLowerCase().includes(term)) ||
                (s.email?.toLowerCase().includes(term)) ||
                (s.phone?.includes(term))
            );
            renderStudents(filtered);
        }

        // Статистика
        function updateStats() {
            document.getElementById('totalStudents').textContent = allStudents.length;
            document.getElementById('verifiedStudents').textContent = allStudents.filter(s => s.emailVerified).length;
            document.getElementById('unverifiedStudents').textContent = allStudents.filter(s => !s.emailVerified).length;
        }

        // Удаление слушателя
        window.deleteStudent = async function(id) {
            const student = allStudents.find(s => s.id === id);
            if (!confirm(`Удалить слушателя "${student?.fullName}"?\nДанные будут потеряны!`)) return;
            if (prompt('Введите "УДАЛИТЬ" для подтверждения') !== 'УДАЛИТЬ') return;
            try {
                await db.collection('users').doc(id).delete();
                showToast('Слушатель удален', 'success');
                loadStudents();
            } catch(err) {
                showToast('Ошибка: ' + err.message, 'error');
            }
        };

        // Отправка письма
        window.resendEmail = async function(id) {
            const student = allStudents.find(s => s.id === id);
            if (!student) return;
            showToast(`Запрос на отправку письма для ${student.email}`, 'info');
            try {
                await db.collection('email_requests').add({
                    email: student.email,
                    studentId: id,
                    requestedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch(e) { console.error(e); }
        };

        // Открыть редактирование
        window.openEditModal = function(id) {
            const student = allStudents.find(s => s.id === id);
            if (!student) return;
            currentEditId = id;
            const html = `
                <div class="form-group"><label>ФИО</label><input type="text" id="editName" value="${escapeHtml(student.fullName || '')}"></div>
                <div class="form-group"><label>Email</label><input type="email" id="editEmail" value="${escapeHtml(student.email)}" readonly style="background:#f5f5f5"></div>
                <div class="form-group"><label>Телефон</label><input type="tel" id="editPhone" value="${escapeHtml(student.phone || '')}"></div>
                <div class="form-group"><label>Образование</label>
                    <select id="editEducation">
                        <option value="">-- Выберите --</option>
                        <option value="высшее" ${student.education === 'высшее' ? 'selected' : ''}>Высшее</option>
                        <option value="среднее-специальное" ${student.education === 'среднее-специальное' ? 'selected' : ''}>Среднее специальное</option>
                        <option value="среднее" ${student.education === 'среднее' ? 'selected' : ''}>Среднее</option>
                    </select>
                </div>
                <div class="form-group"><label>Фактический адрес</label><input type="text" id="editActual" value="${escapeHtml(student.actualAddress || '')}"></div>
                <div class="form-group"><label>Адрес прописки</label><input type="text" id="editReg" value="${escapeHtml(student.registrationAddress || '')}"></div>
                <div class="form-group"><label>Паспорт</label><input type="text" id="editPassport" value="${escapeHtml(student.passportNumber || '')}"></div>
                <div class="form-group"><label>СНИЛС</label><input type="text" id="editSnils" value="${escapeHtml(student.snils || '')}"></div>
                <div class="form-actions"><button class="btn-primary" id="saveEditBtn">💾 Сохранить</button><button class="btn-danger" id="cancelEditBtn">❌ Отмена</button></div>
            `;
            document.getElementById('editForm').innerHTML = html;
            document.getElementById('editModal').style.display = 'block';
            document.getElementById('saveEditBtn').onclick = saveStudentEdit;
            document.getElementById('cancelEditBtn').onclick = () => document.getElementById('editModal').style.display = 'none';
        };

        // Сохранить редактирование
        async function saveStudentEdit() {
            if (!currentEditId) return;
            const updates = {
                fullName: document.getElementById('editName').value,
                phone: document.getElementById('editPhone').value,
                education: document.getElementById('editEducation').value,
                actualAddress: document.getElementById('editActual').value,
                registrationAddress: document.getElementById('editReg').value,
                passportNumber: document.getElementById('editPassport').value,
                snils: document.getElementById('editSnils').value
            };
            try {
                await db.collection('users').doc(currentEditId).update(updates);
                showToast('Данные обновлены', 'success');
                document.getElementById('editModal').style.display = 'none';
                loadStudents();
            } catch(err) {
                showToast('Ошибка: ' + err.message, 'error');
            }
        }

        // Создание слушателя
        async function createStudent() {
            const name = document.getElementById('newName').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const phone = document.getElementById('newPhone').value.trim();
            const edu = document.getElementById('newEducation').value;
            const pass = document.getElementById('newPassword').value;
            
            if (!name || !email) { showToast('Заполните ФИО и Email', 'warning'); return; }
            if (pass.length < 6) { showToast('Пароль минимум 6 символов', 'warning'); return; }
            
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, pass);
                await userCred.user.sendEmailVerification();
                await db.collection('users').doc(userCred.user.uid).set({
                    fullName: name, email, phone: phone || '', education: edu || '',
                    role: 'student', emailVerified: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    actualAddress: '', registrationAddress: '',
                    passportNumber: '', passportIssuedBy: '', passportIssueDate: '', snils: '',
                    customFields: {}
                });
                showToast(`✅ Слушатель ${name} создан`, 'success');
                document.getElementById('newName').value = '';
                document.getElementById('newEmail').value = '';
                document.getElementById('newPhone').value = '';
                document.getElementById('newEducation').value = '';
                loadStudents();
                switchTab('students');
            } catch(err) {
                if (err.code === 'auth/email-already-in-use') showToast('Email уже существует', 'warning');
                else showToast('Ошибка: ' + err.message, 'error');
            }
        }

        // Экспорт в Excel
        async function exportToExcel() {
            try {
                const data = allStudents.map(s => ({
                    'ФИО': s.fullName || '',
                    'Email': s.email || '',
                    'Телефон': s.phone || '',
                    'Образование': s.education || '',
                    'Статус': s.emailVerified ? 'Подтвержден' : 'Не подтвержден',
                    'Дата регистрации': formatDate(s.createdAt),
                    'Фактический адрес': s.actualAddress || '',
                    'Адрес прописки': s.registrationAddress || '',
                    'Паспорт': s.passportNumber || '',
                    'СНИЛС': s.snils || ''
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Слушатели');
                XLSX.writeFile(wb, `Слушатели_${new Date().toISOString().slice(0,10)}.xlsx`);
                showToast(`✅ Экспортировано ${allStudents.length} слушателей`, 'success');
            } catch(err) {
                showToast('Ошибка экспорта: ' + err.message, 'error');
            }
        }

        // Предпросмотр импорта
        function previewImport() {
            const file = document.getElementById('importFile').files[0];
            if (!file) { showToast('Выберите файл', 'warning'); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                importData = XLSX.utils.sheet_to_json(sheet);
                const previewDiv = document.getElementById('preview');
                if (!importData.length) { previewDiv.innerHTML = '<p>Нет данных</p>'; return; }
                let html = '<h4>Предпросмотр (первые 5 строк):</h4><table style="width:100%;border-collapse:collapse"><thead><tr>';
                Object.keys(importData[0]).forEach(k => html += `<th style="border:1px solid #ddd;padding:5px">${escapeHtml(k)}</th>`);
                html += '</tr></thead><tbody>';
                importData.slice(0,5).forEach(row => {
                    html += '<tr>';
                    Object.values(row).forEach(v => html += `<td style="border:1px solid #ddd;padding:5px">${escapeHtml(String(v || ''))}</td>`);
                    html += '</tr>';
                });
                html += '</tbody></table><div class="form-actions" style="margin-top:15px"><button class="btn-primary" id="doImportBtn">✅ Начать импорт</button></div>';
                previewDiv.innerHTML = html;
                document.getElementById('doImportBtn').onclick = confirmImport;
            };
            reader.readAsArrayBuffer(file);
        }

        // Подтверждение импорта
        async function confirmImport() {
            showToast(`⏳ Импорт ${importData.length} записей...`, 'info');
            let ok = 0, skip = 0, error = 0;
            for (const row of importData) {
                try {
                    const email = row.Email || row.email || '';
                    const name = row['ФИО'] || row.fullName || row.фио || '';
                    if (!email || !name) { skip++; continue; }
                    const exist = await db.collection('users').where('email', '==', email).get();
                    if (!exist.empty) { skip++; continue; }
                    const phone = row.Телефон || row.phone || '';
                    const edu = row.Образование || row.education || '';
                    const userCred = await auth.createUserWithEmailAndPassword(email, 'student123');
                    await userCred.user.sendEmailVerification();
                    await db.collection('users').doc(userCred.user.uid).set({
                        fullName: name, email, phone, education: edu,
                        role: 'student', emailVerified: false,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        actualAddress: '', registrationAddress: '',
                        passportNumber: '', passportIssuedBy: '', passportIssueDate: '', snils: '',
                        customFields: {}
                    });
                    ok++;
                } catch(e) { error++; }
            }
            showToast(`✅ Импорт: +${ok}, пропущено ${skip}, ошибок ${error}`, 'success');
            document.getElementById('preview').innerHTML = '';
            document.getElementById('importFile').value = '';
            importData = [];
            loadStudents();
        }

        // Выход
        async function logout() {
            await auth.signOut();
            window.location.href = 'index.html';
        }

        // Инициализация
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        document.getElementById('exportBtn')?.addEventListener('click', exportToExcel);
        document.getElementById('exportXlsxBtn')?.addEventListener('click', exportToExcel);
        document.getElementById('createBtn')?.addEventListener('click', createStudent);
        document.getElementById('previewBtn')?.addEventListener('click', previewImport);
        document.getElementById('searchInput')?.addEventListener('input', searchStudents);
        document.getElementById('closeModal')?.addEventListener('click', () => document.getElementById('editModal').style.display = 'none');
        
        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });
        document.querySelectorAll('.stat-card').forEach(card => {
            card.addEventListener('click', () => switchTab('students'));
        });

        // Проверка авторизации
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            if (!user.emailVerified) {
                showToast('Подтвердите email', 'warning');
                setTimeout(() => window.location.href = 'index.html', 3000);
                return;
            }
            const doc = await db.collection('users').doc(user.uid).get();
            const role = doc.data()?.role;
            if (role === 'admin') window.location.href = 'admin-cabinet.html';
            else if (role === 'student') window.location.href = 'student-cabinet.html';
            else if (role !== 'metodist') window.location.href = 'index.html';
            document.getElementById('userName').textContent = doc.data()?.fullName || user.email;
            loadStudents();
        });
    </script>
</body>
</html>
