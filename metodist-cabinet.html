        // ========== УДАЛЕНИЕ ПОЛЯ (С ОЧИСТКОЙ ДАННЫХ) ==========
        async function deleteField(id) {
            const field = allFields.find(f => f.id === id);
            if (!field) return;

            // Подсчитываем количество слушателей, у которых заполнено это поле
            let filledCount = 0;
            try {
                for (const student of allStudents) {
                    if (student.customFields && student.customFields[id] && student.customFields[id].trim() !== '') {
                        filledCount++;
                    }
                }
            } catch (e) {
                console.error('Ошибка подсчета:', e);
            }
            
            // Формируем сообщение с предупреждением
            let message = `⚠️ ВНИМАНИЕ!\n\n`;
            message += `Вы уверены, что хотите удалить поле "${field.label}"?\n\n`;
            message += `📊 Статистика:\n`;
            message += `• Всего слушателей: ${allStudents.length}\n`;
            message += `• Заполнено у: ${filledCount} слушателей\n\n`;
            message += `❗ Последствия:\n`;
            message += `• Поле будет удалено у ВСЕХ слушателей\n`;
            message += `• ВСЕ данные для этого поля будут безвозвратно потеряны\n`;
            message += `• Поле исчезнет из интерфейса\n\n`;
            message += `Отменить это действие будет невозможно!\n\n`;
            message += `Нажмите "ОК" для подтверждения удаления.`;
            
            if (!confirm(message)) return;
            
            // Дополнительное подтверждение с вводом текста
            const confirmText = prompt(`Для подтверждения удаления поля "${field.label}" введите "УДАЛИТЬ":`);
            if (confirmText !== "УДАЛИТЬ") {
                showToast('❌ Удаление отменено', 'warning');
                return;
            }
            
            showToast('⏳ Удаление поля... Пожалуйста, подождите', 'info');
            
            try {
                // 1. Получаем всех слушателей
                const studentsSnapshot = await window.db.collection('users')
                    .where('role', '==', 'student')
                    .get();
                
                // 2. Удаляем значения этого поля у всех слушателей
                const updatePromises = [];
                let updatedCount = 0;
                
                for (const doc of studentsSnapshot.docs) {
                    const userData = doc.data();
                    if (userData.customFields && userData.customFields[id] !== undefined) {
                        const updatedCustomFields = { ...userData.customFields };
                        delete updatedCustomFields[id];
                        updatePromises.push(
                            window.db.collection('users').doc(doc.id).update({
                                customFields: updatedCustomFields,
                                customFieldsCleanedAt: firebase.firestore.FieldValue.serverTimestamp()
                            })
                        );
                        updatedCount++;
                    }
                }
                
                // Ждем завершения всех обновлений
                if (updatePromises.length > 0) {
                    await Promise.all(updatePromises);
                }
                
                // 3. Удаляем само поле из коллекции custom_fields
                await window.db.collection('custom_fields').doc(id).delete();
                
                showToast(`✅ Поле "${field.label}" полностью удалено! Очищено записей: ${updatedCount}`, 'success');
                
                // 4. Обновляем списки
                await loadFields();
                await loadStudents();
                
            } catch (error) {
                console.error('Ошибка удаления поля:', error);
                showToast('❌ Ошибка при удалении поля: ' + error.message, 'error');
            }
        }

        function toggleOptionsFields() {
            const type = document.getElementById('fieldType').value;

            optionsBlock.style.display = (type === 'radio' || type === 'select') ? 'block' : 'none';
        }

        function addOptionField(value = '') {
            const optionsList = document.getElementById('optionsList');
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.gap = '10px';
            div.style.marginBottom = '10px';
            div.innerHTML = `
                <input type="text" placeholder="Вариант" class="option-input" style="flex:1;" value="${escapeHtml(value)}">

            `;

        function removeOption(btn) {

        function getOptions() {
            const inputs = document.querySelectorAll('#optionsList .option-input');
            const options = [];
            inputs.forEach(input => {
                const val = input.value.trim();
                if (val) options.push(val);
            });
            return options;
        }

        function setOptions(options) {
            const container = document.getElementById('optionsList');
            container.innerHTML = '';

        }

        async function initMetodistPage() {
            console.log('Инициализация страницы методиста...');

            const user = window.auth.currentUser;
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const userDoc = await window.db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    await window.auth.signOut();
                    window.location.href = 'index.html';
                    return;
                }
                
                const userData = userDoc.data();
                
                if (userData.role !== 'metodist') {
                    if (userData.role === 'admin') {
                        window.location.href = 'admin-cabinet.html';
                    } else if (userData.role === 'student') {
                        window.location.href = 'student-cabinet.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                    return;
                }
                
                // Отображаем имя пользователя
                const userNameSpan = document.getElementById('userName');
                if (userNameSpan) {
                    userNameSpan.textContent = userData.fullName || userData.email;
                }
                
                await loadStudents();
                await loadFields();
                
            } catch (error) {
                console.error('Ошибка инициализации:', error);
                window.location.href = 'index.html';
            }
        }
