<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Институт ДПО - Личный кабинет слушателя</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2c5f2d;
            --primary-dark: #1e3a1f;
            --secondary: #ffc107;
            --danger: #dc3545;
            --success: #28a745;
            --warning: #ff9800;
            --info: #17a2b8;
            --gray-light: #f5f5f5;
            --gray: #ddd;
            --dark: #333;
            --white: #fff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-hover: 0 10px 20px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-sm: 10px;
        }
        body {
            font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            color: var(--dark);
        }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo { font-size: 36px; background: var(--secondary); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .header h1 { font-size: clamp(18px, 5vw, 24px); font-weight: 500; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-name { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; font-size: 14px; }
        .btn-logout { background: var(--danger); color: white; border: none; padding: 10px 24px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s; }
        .btn-logout:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--white);
            padding: 10px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            background: var(--gray-light);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--dark);
            transition: all 0.3s;
        }
        .tab-btn:hover { background: var(--gray); transform: translateY(-2px); }
        .tab-btn.active { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; }
        .tab-content {
            display: none;
            background: var(--white);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            animation: fadeIn 0.3s;
        }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Карточки полей */
        .fields-card {
            background: var(--gray-light);
            border-radius: var(--radius);
            padding: 25px;
        }
        .fields-card h3 {
            color: var(--primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--gray);
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .fields-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .field-row {
            background: var(--white);
            border-radius: var(--radius-sm);
            padding: 12px 15px;
            transition: all 0.3s;
            border-left: 3px solid var(--primary);
        }
        .field-row:hover { transform: translateX(3px); box-shadow: var(--shadow); }
        .field-label {
            font-weight: 600;
            color: var(--primary);
            font-size: 13px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .field-value {
            color: var(--dark);
            font-size: 15px;
            word-break: break-word;
        }
        .field-value.empty { color: #999; font-style: italic; }
        .field-semantics {
            font-size: 10px;
            color: var(--info);
            margin-top: 5px;
        }
        .field-semantics a { color: var(--info); text-decoration: none; }
        
        /* Формы редактирования */
        .edit-form {
            background: var(--white);
            border-radius: var(--radius-sm);
            padding: 20px;
            margin-top: 15px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 13px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--gray);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44,95,45,0.1);
        }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .save-btn { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; }
        .cancel-btn { background: var(--secondary); color: var(--dark); border: none; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; }
        .edit-category-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
        }
        
        /* Сообщения */
        .success-message, .error-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: var(--radius-sm);
            display: none;
            z-index: 1001;
            animation: slideIn 0.3s;
            box-shadow: var(--shadow-hover);
            font-weight: 500;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .success-message { background: var(--success); color: white; }
        .error-message { background: var(--danger); color: white; }
        
        /* Radio и Select */
        .radio-group { display: flex; flex-wrap: wrap; gap: 15px; padding: 10px 0; }
        .radio-group label { display: inline-flex; align-items: center; cursor: pointer; font-weight: normal; margin-bottom: 0; }
        .radio-group input[type="radio"] { width: auto; margin-right: 8px; }
        
        @media (max-width: 768px) {
            .header { padding: 15px 20px; }
            .tabs { flex-direction: column; }
            .tab-btn { width: 100%; text-align: center; }
            .fields-grid { grid-template-columns: 1fr; }
            .tab-content { padding: 20px; }
            .form-actions { flex-direction: column; }
            .form-actions button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <div class="logo">🎓</div>
            <h1>Институт ДПО - Личный кабинет слушателя</h1>
        </div>
        <div class="user-info">
            <span class="user-name" id="userName">Загрузка...</span>
            <button class="btn-logout" onclick="window.logout()">🚪 Выйти</button>
        </div>
    </div>

    <div class="container">
        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>

        <!-- Вкладки будут созданы динамически -->
        <div id="tabsContainer" class="tabs"></div>

        <!-- Контейнеры для вкладок -->
        <div id="tabContentsContainer"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let currentUserData = null;
        let allFields = [];
        let editMode = null; // { category: 'profile', fieldId: 'fullName' }
        let categoryFieldsMap = {};

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            if (el) {
                el.textContent = message;
                el.style.display = 'block';
                setTimeout(() => el.style.display = 'none', 3000);
            }
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            if (el) {
                el.textContent = message;
                el.style.display = 'block';
                setTimeout(() => el.style.display = 'none', 5000);
            } else {
                alert(message);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
            });
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'Не указана';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                return date.toLocaleDateString('ru-RU');
            } catch(e) {
                return 'Не указана';
            }
        }

        // ========== ЗАГРУЗКА ПОЛЕЙ ==========
        async function loadFieldsConfiguration() {
            console.log('🔄 Загрузка конфигурации полей...');
            
            try {
                // Загружаем системные поля
                const systemSnapshot = await window.db.collection('system_fields').get();
                const systemFields = [];
                systemSnapshot.forEach(doc => {
                    systemFields.push({ id: doc.id, ...doc.data(), isSystem: true });
                });
                
                // Загружаем пользовательские поля
                const customSnapshot = await window.db.collection('custom_fields').get();
                const customFields = [];
                customSnapshot.forEach(doc => {
                    customFields.push({ id: doc.id, ...doc.data(), isSystem: false });
                });
                
                allFields = [...systemFields, ...customFields];
                
                // Группируем по категориям
                categoryFieldsMap = {
                    profile: allFields.filter(f => f.category === 'profile' && f.isActive !== false),
                    documents: allFields.filter(f => f.category === 'documents' && f.isActive !== false),
                    address: allFields.filter(f => f.category === 'address' && f.isActive !== false),
                    custom: allFields.filter(f => (f.category === 'custom' || (!f.category && !f.isSystem)) && f.isActive !== false)
                };
                
                // Сортируем по order
                for (const cat in categoryFieldsMap) {
                    categoryFieldsMap[cat].sort((a, b) => (a.order || 0) - (b.order || 0));
                }
                
                console.log('✅ Загружено полей:', allFields.length);
                console.log('📁 Категории:', {
                    profile: categoryFieldsMap.profile.length,
                    documents: categoryFieldsMap.documents.length,
                    address: categoryFieldsMap.address.length,
                    custom: categoryFieldsMap.custom.length
                });
                
                return true;
            } catch (error) {
                console.error('Ошибка загрузки полей:', error);
                showError('Ошибка загрузки конфигурации полей');
                return false;
            }
        }

        // ========== ОТОБРАЖЕНИЕ ВКЛАДОК ==========
        function renderTabs() {
            const tabsContainer = document.getElementById('tabsContainer');
            const contentsContainer = document.getElementById('tabContentsContainer');
            
            if (!tabsContainer || !contentsContainer) return;
            
            const categories = [
                { id: 'profile', name: '👤 Личные данные', icon: '👤' },
                { id: 'documents', name: '📄 Паспортные данные', icon: '📄' },
                { id: 'address', name: '🏠 Адреса', icon: '🏠' },
                { id: 'custom', name: '⭐ Дополнительные поля', icon: '⭐' }
            ];
            
            // Создаем вкладки
            tabsContainer.innerHTML = categories.map((cat, index) => `
                <button class="tab-btn ${index === 0 ? 'active' : ''}" onclick="switchTab('${cat.id}')">
                    ${cat.icon} ${cat.name.split(' ')[0]}
                </button>
            `).join('');
            
            // Создаем контейнеры для содержимого
            contentsContainer.innerHTML = categories.map(cat => `
                <div id="${cat.id}Tab" class="tab-content ${cat.id === 'profile' ? 'active' : ''}">
                    <div class="fields-card">
                        <h3>${cat.name}</h3>
                        <div id="${cat.id}FieldsContainer"></div>
                    </div>
                </div>
            `).join('');
        }

        // ========== ОТОБРАЖЕНИЕ ПОЛЕЙ ==========
        function renderFields() {
            for (const [category, fields] of Object.entries(categoryFieldsMap)) {
                const container = document.getElementById(`${category}FieldsContainer`);
                if (!container) continue;
                
                if (fields.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:40px; color:#999;">📭 Нет полей для отображения</div>';
                    continue;
                }
                
                // Проверяем, в режиме ли редактирования вся категория
                const isEditingCategory = editMode && editMode.category === category && !editMode.fieldId;
                
                if (isEditingCategory) {
                    container.innerHTML = renderEditCategoryForm(category, fields);
                } else {
                    container.innerHTML = renderViewMode(category, fields);
                }
            }
        }

        // Режим просмотра
        function renderViewMode(category, fields) {
            let html = `<div class="fields-grid">`;
            
            for (const field of fields) {
                const value = currentUserData ? currentUserData[field.id] : '';
                const hasValue = value && (typeof value !== 'string' || value.trim() !== '');
                
                html += `
                    <div class="field-row">
                        <div class="field-label">
                            <span>${escapeHtml(field.label)}${field.isRequired ? ' <span style="color:#dc3545;">*</span>' : ''}</span>
                        </div>
                        <div class="field-value ${!hasValue ? 'empty' : ''}">
                            ${hasValue ? escapeHtml(value) : 'Не указано'}
                        </div>
                        ${field.semantics ? `
                            <div class="field-semantics">
                                🔗 <a href="${escapeHtml(field.semantics)}" target="_blank">${escapeHtml(field.semantics)}</a>
                            </div>
                        ` : ''}
                    </div>
                `;
            }
            
            html += `</div>`;
            html += `<button class="edit-category-btn" onclick="startEditCategory('${category}')" style="margin-top:20px;">✏️ Редактировать все</button>`;
            
            return html;
        }

        // Режим редактирования категории
        function renderEditCategoryForm(category, fields) {
            let html = `<div class="edit-form">`;
            
            for (const field of fields) {
                const value = currentUserData ? currentUserData[field.id] : '';
                
                html += `<div class="form-group">`;
                html += `<label>${escapeHtml(field.label)}${field.isRequired ? ' <span style="color:#dc3545;">*</span>' : ''}</label>`;
                html += renderFieldInput(field, value, `field_${field.id}`);
                if (field.semantics) {
                    html += `<small style="display:block; margin-top:5px; color:#17a2b8;">🔗 Схема: ${escapeHtml(field.semantics)}</small>`;
                }
                html += `</div>`;
            }
            
            html += `
                <div class="form-actions">
                    <button class="save-btn" onclick="saveCategory('${category}')">💾 Сохранить все</button>
                    <button class="cancel-btn" onclick="cancelEdit()">❌ Отмена</button>
                </div>
            </div>`;
            
            return html;
        }

        // Рендер поля в зависимости от типа
        function renderFieldInput(field, value, fieldId) {
            const type = field.type || 'text';
            
            switch (type) {
                case 'radio':
                    if (!field.options || !field.options.length) {
                        return `<p style="color:red;">Нет вариантов</p>`;
                    }
                    let radioHtml = `<div class="radio-group">`;
                    for (const opt of field.options) {
                        radioHtml += `
                            <label>
                                <input type="radio" name="${fieldId}" value="${escapeHtml(opt)}" ${value === opt ? 'checked' : ''}>
                                <span>${escapeHtml(opt)}</span>
                            </label>
                        `;
                    }
                    radioHtml += `</div>`;
                    return radioHtml;
                    
                case 'select':
                    if (!field.options || !field.options.length) {
                        return `<p style="color:red;">Нет вариантов</p>`;
                    }
                    let selectHtml = `<select id="${fieldId}" style="width:100%; padding:12px; border:2px solid #ddd; border-radius:10px;">`;
                    selectHtml += `<option value="">-- Выберите --</option>`;
                    for (const opt of field.options) {
                        selectHtml += `<option value="${escapeHtml(opt)}" ${value === opt ? 'selected' : ''}>${escapeHtml(opt)}</option>`;
                    }
                    selectHtml += `</select>`;
                    return selectHtml;
                    
                case 'textarea':
                    return `<textarea id="${fieldId}" rows="3" style="width:100%; padding:12px; border:2px solid #ddd; border-radius:10px;" placeholder="${escapeHtml(field.placeholder || '')}">${escapeHtml(value)}</textarea>`;
                    
                case 'email':
                    return `<input type="email" id="${fieldId}" value="${escapeHtml(value)}" placeholder="${escapeHtml(field.placeholder || '')}" style="width:100%; padding:12px; border:2px solid #ddd; border-radius:10px;">`;
                    
                case 'tel':
                    return `<input type="tel" id="${fieldId}" value="${escapeHtml(value)}" placeholder="${escapeHtml(field.placeholder || '')}" style="width:100%; padding:12px; border:2px solid #ddd; border-radius:10px;">`;
                    
                case 'date':
                    return `<input type="date" id="${fieldId}" value="${escapeHtml(value)}" style="width:100%; padding:12px; border:2px solid #ddd; border-radius:10px;">`;
                    
                case 'number':
                    return `<input type="number" id="${fieldId}" value="${escapeHtml(value)}" placeholder="${escapeHtml(field.placeholder || '')}" style="width:100%; padding:12px; border:2px solid #ddd; border-radius:10px;">`;
                    
                default:
                    return `<input type="text" id="${fieldId}" value="${escapeHtml(value)}" placeholder="${escapeHtml(field.placeholder || '')}" style="width:100%; padding:12px; border:2px solid #ddd; border-radius:10px;">`;
            }
        }

        // ========== РЕДАКТИРОВАНИЕ ==========
        function startEditCategory(category) {
            editMode = { category: category };
            renderFields();
        }

        function cancelEdit() {
            editMode = null;
            renderFields();
        }

        async function saveCategory(category) {
            const userId = window.auth.currentUser?.uid;
            if (!userId) {
                showError('Пользователь не авторизован');
                return;
            }
            
            const fields = categoryFieldsMap[category];
            const updates = {};
            
            for (const field of fields) {
                let value;
                if (field.type === 'radio') {
                    const selected = document.querySelector(`input[name="field_${field.id}"]:checked`);
                    value = selected ? selected.value : '';
                } else {
                    const element = document.getElementById(`field_${field.id}`);
                    value = element ? element.value : '';
                }
                updates[field.id] = value;
            }
            
            // Проверка обязательных полей
            const requiredFields = fields.filter(f => f.isRequired);
            const missingFields = [];
            
            for (const field of requiredFields) {
                const val = updates[field.id];
                if (!val || (typeof val === 'string' && val.trim() === '')) {
                    missingFields.push(field.label);
                }
            }
            
            if (missingFields.length > 0) {
                showError(`⚠️ Заполните обязательные поля: ${missingFields.join(', ')}`);
                return;
            }
            
            try {
                await window.db.collection('users').doc(userId).update(updates);
                
                // Обновляем локальные данные
                currentUserData = { ...currentUserData, ...updates };
                
                // Обновляем имя пользователя в хедере если изменили
                if (updates.fullName) {
                    document.getElementById('userName').textContent = updates.fullName;
                }
                
                showSuccess('✅ Данные успешно сохранены!');
                editMode = null;
                renderFields();
                
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                showError('❌ Ошибка: ' + error.message);
            }
        }

        // ========== ЗАГРУЗКА ДАННЫХ ПОЛЬЗОВАТЕЛЯ ==========
        async function loadUserData() {
            const user = window.auth.currentUser;
            if (!user) return;
            
            try {
                const doc = await window.db.collection('users').doc(user.uid).get();
                
                if (!doc.exists) {
                    // Создаем пользователя с пустыми значениями
                    const defaultData = {
                        email: user.email,
                        role: 'student',
                        emailVerified: user.emailVerified,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    // Добавляем все поля из конфигурации
                    for (const field of allFields) {
                        defaultData[field.id] = '';
                    }
                    
                    await window.db.collection('users').doc(user.uid).set(defaultData);
                    currentUserData = defaultData;
                } else {
                    currentUserData = doc.data();
                }
                
                // Обновляем имя в хедере
                const userNameSpan = document.getElementById('userName');
                if (userNameSpan && currentUserData.fullName) {
                    userNameSpan.textContent = currentUserData.fullName;
                } else if (userNameSpan) {
                    userNameSpan.textContent = currentUserData.email || user.email;
                }
                
                renderFields();
                
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                showError('Ошибка загрузки данных: ' + error.message);
            }
        }

        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            const tabContent = document.getElementById(`${tabName}Tab`);
            const tabBtn = document.querySelector(`[onclick="switchTab('${tabName}')"]`);
            
            if (tabContent) tabContent.classList.add('active');
            if (tabBtn) tabBtn.classList.add('active');
            
            // При переключении вкладки сбрасываем режим редактирования
            if (editMode) {
                editMode = null;
                renderFields();
            }
        }

        // ========== ВЫХОД ==========
        async function logout() {
            try {
                await window.auth.signOut();
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Ошибка выхода:', error);
                showError('Ошибка при выходе из системы');
            }
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        async function init() {
            console.log('🚀 Инициализация student-cabinet.html...');
            
            const user = window.auth.currentUser;
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            if (!user.emailVerified) {
                showError('Пожалуйста, подтвердите email перед входом. Проверьте вашу почту.');
                setTimeout(async () => {
                    await window.auth.signOut();
                    window.location.href = 'index.html';
                }, 3000);
                return;
            }
            
            // Загружаем конфигурацию полей
            const fieldsLoaded = await loadFieldsConfiguration();
            if (!fieldsLoaded) {
                showError('Не удалось загрузить конфигурацию полей');
                return;
            }
            
            // Создаем вкладки
            renderTabs();
            
            // Загружаем данные пользователя
            await loadUserData();
        }

        // Экспортируем глобальные функции
        window.switchTab = switchTab;
        window.startEditCategory = startEditCategory;
        window.saveCategory = saveCategory;
        window.cancelEdit = cancelEdit;
        window.logout = logout;
        window.showSuccess = showSuccess;
        window.showError = showError;

        // Запуск
        window.auth.onAuthStateChanged((user) => {
            console.log('Auth state changed:', user?.email);
            if (user) {
                init();
            } else {
                window.location.href = 'index.html';
            }
        });
        
        console.log('✅ student-cabinet.html загружен');
    </script>
</body>
</html>
