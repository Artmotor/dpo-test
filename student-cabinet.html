<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Институт ДПО - Личный кабинет слушателя</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2c5f2d;
            --primary-dark: #1e3a1f;
            --primary-light: #4a7c4b;
            --secondary: #ffc107;
            --secondary-dark: #e0a800;
            --accent: #97233f;
            --gray-light: #f5f5f5;
            --gray: #ddd;
            --dark: #333;
            --white: #fff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ff9800;
            --info: #17a2b8;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-hover: 0 10px 20px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 36px;
            background: var(--secondary);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-size: clamp(18px, 5vw, 24px);
            font-weight: 500;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-name {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }

        .btn-logout {
            background: var(--danger);
            color: var(--white);
            border: none;
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--white);
            padding: 10px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            background: var(--gray-light);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            color: var(--dark);
        }

        .tab-btn:hover {
            background: var(--gray);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
        }

        /* Контент вкладок */
        .tab-content {
            display: none;
            background: var(--white);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Карточки информации */
        .info-card {
            background: var(--gray-light);
            border-radius: var(--radius);
            padding: 20px;
        }

        .info-card h3 {
            color: var(--primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--gray);
            font-weight: 500;
        }

        .info-row {
            margin-bottom: 12px;
            padding: 10px;
            background: var(--white);
            border-radius: var(--radius-sm);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .info-label {
            font-weight: bold;
            color: #555;
            min-width: 180px;
        }

        .info-value {
            color: var(--dark);
            flex: 1;
        }

        .edit-btn {
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            width: auto;
        }

        .edit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* Формы редактирования */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--gray);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44, 95, 45, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .save-btn {
            background: var(--success);
            width: auto;
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
        }

        .cancel-btn {
            background: var(--secondary);
            width: auto;
            padding: 10px 20px;
            color: var(--dark);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
        }

        /* Сообщения */
        .success-message, .error-message, .info-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: var(--radius-sm);
            display: none;
            z-index: 1001;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-hover);
            font-weight: 500;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .success-message {
            background: var(--success);
            color: white;
        }

        .error-message {
            background: var(--danger);
            color: white;
        }

        .info-message {
            background: var(--info);
            color: white;
        }

        /* Стили для динамических полей */
        .custom-field {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid var(--gray);
            border-radius: var(--radius-sm);
            background: #fafafa;
            transition: all 0.3s;
        }

        .custom-field.required-missing {
            border-left: 4px solid var(--warning);
            background: #fff8e1;
        }

        .required-star {
            color: var(--danger);
            margin-left: 5px;
        }

        .missing-badge {
            background: var(--warning);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 10px;
        }

        .field-warning {
            color: var(--warning);
            font-size: 11px;
            display: block;
            margin-top: 5px;
        }

        .field-semantics {
            font-size: 11px;
            color: #667eea;
            display: block;
            margin-top: 5px;
        }

        .field-semantics a {
            color: #667eea;
            text-decoration: none;
        }

        .field-semantics a:hover {
            text-decoration: underline;
        }

        .warning-banner {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px 15px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .warning-btn {
            background: #ffc107;
            color: #856404;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            width: auto;
        }

        .save-fields-btn {
            background: var(--success);
            width: auto;
            padding: 10px 20px;
            margin-top: 10px;
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 500;
        }

        .save-fields-btn:hover {
            background: #1e7e34;
            transform: translateY(-2px);
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 10px 0;
        }

        .radio-group label {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            font-weight: normal;
            margin-bottom: 0;
        }

        .radio-group input[type="radio"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        select, input, textarea {
            font-family: inherit;
        }

        .empty-fields {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            .tabs {
                flex-direction: column;
            }
            
            .tab-btn {
                width: 100%;
            }
            
            .info-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            
            .info-label {
                min-width: auto;
            }
            
            .form-actions {
                flex-direction: column;
            }
            
            .form-actions button {
                width: 100%;
            }
            
            .warning-banner {
                flex-direction: column;
                text-align: center;
            }
            
            .tab-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <div class="logo">🎓</div>
            <h1>Институт ДПО - Личный кабинет слушателя</h1>
        </div>
        <div class="user-info">
            <span class="user-name" id="userName">Загрузка...</span>
            <button class="btn-logout" onclick="logout()">🚪 Выйти</button>
        </div>
    </div>

    <div class="container">
        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>
        <div id="infoMessage" class="info-message"></div>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('profile')">👤 Мои данные</button>
            <button class="tab-btn" onclick="switchTab('documents')">📄 Паспортные данные</button>
            <button class="tab-btn" onclick="switchTab('address')">🏠 Адреса</button>
            <button class="tab-btn" onclick="switchTab('additionalFields')">📋 Дополнительные поля</button>
        </div>

        <!-- Вкладка профиля -->
        <div id="profileTab" class="tab-content active">
            <div class="info-card">
                <h3>Личная информация</h3>
                <div id="profileInfo"></div>
                <button class="edit-btn" onclick="editProfile()">✏️ Редактировать профиль</button>
            </div>
        </div>

        <!-- Вкладка паспортных данных -->
        <div id="documentsTab" class="tab-content">
            <div class="info-card">
                <h3>Паспортные данные</h3>
                <div id="documentsInfo"></div>
                <button class="edit-btn" onclick="editDocuments()">✏️ Редактировать документы</button>
            </div>
        </div>

        <!-- Вкладка адресов -->
        <div id="addressTab" class="tab-content">
            <div class="info-card">
                <h3>Адреса</h3>
                <div id="addressInfo"></div>
                <button class="edit-btn" onclick="editAddress()">✏️ Редактировать адреса</button>
            </div>
        </div>

        <!-- Вкладка дополнительных полей -->
        <div id="additionalFieldsTab" class="tab-content">
            <div class="info-card">
                <h3>📋 Дополнительная информация</h3>
                <div id="missingFieldsWarning" style="display: none;"></div>
                <div id="customFieldsContainer">
                    <div style="text-align: center; padding: 40px; color: #999;">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Конфигурация -->
    <script src="firebase-config.js"></script>
    
    <!-- Общие функции -->
    <script src="common.js"></script>
    
    <!-- Управление полями (ядро) -->
    <script src="fields-manager.js"></script>
    
    <!-- Скрипт для динамических полей слушателя -->
    <script src="student-fields.js"></script>

    <script>
        let currentUserData = null;
        let currentEditMode = null;

        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        function switchTab(tabName) {
            const tabs = ['profile', 'documents', 'address', 'additionalFields'];
            tabs.forEach(tab => {
                const tabElement = document.getElementById(`${tab}Tab`);
                const btnElement = document.querySelector(`[onclick="switchTab('${tab}')"]`);
                if (tabElement) {
                    if (tab === tabName) {
                        tabElement.classList.add('active');
                        if (btnElement) btnElement.classList.add('active');
                    } else {
                        tabElement.classList.remove('active');
                        if (btnElement) btnElement.classList.remove('active');
                    }
                }
            });
            
            // При переключении на вкладку дополнительных полей - ПРИНУДИТЕЛЬНО обновляем
            if (tabName === 'additionalFields') {
                console.log('🔄 Переключение на вкладку дополнительных полей');
                setTimeout(() => {
                    if (typeof refreshCustomFields === 'function') {
                        refreshCustomFields();
                    } else if (typeof loadCustomFields === 'function') {
                        loadCustomFields();
                    }
                }, 100);
            }
        }

        // ========== СООБЩЕНИЯ ==========
        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showInfo(message) {
            const el = document.getElementById('infoMessage');
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        // ========== ФОРМАТИРОВАНИЕ ==========
        function formatDate(timestamp) {
            if (!timestamp) return 'Не указана';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                return date.toLocaleDateString('ru-RU');
            } catch (e) {
                return 'Не указана';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // ========== ЗАГРУЗКА ДАННЫХ ПОЛЬЗОВАТЕЛЯ ==========
        async function loadUserData() {
            const user = window.auth.currentUser;
            if (!user) return;

            try {
                const doc = await window.db.collection('users').doc(user.uid).get();
                
                if (!doc.exists) {
                    const defaultData = {
                        fullName: user.email.split('@')[0],
                        email: user.email,
                        phone: '',
                        education: '',
                        role: 'student',
                        emailVerified: user.emailVerified,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                        actualAddress: '',
                        registrationAddress: '',
                        passportNumber: '',
                        passportIssuedBy: '',
                        passportIssueDate: '',
                        snils: ''
                    };
                    await window.db.collection('users').doc(user.uid).set(defaultData);
                    currentUserData = defaultData;
                } else {
                    currentUserData = doc.data();
                }
                
                document.getElementById('userName').textContent = currentUserData.fullName || currentUserData.email;
                
                displayProfileData();
                displayDocumentsData();
                displayAddressData();
                
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                showError('Ошибка загрузки данных');
            }
        }

        // ========== ОТОБРАЖЕНИЕ ДАННЫХ ==========
        function displayProfileData() {
            const container = document.getElementById('profileInfo');
            if (!container) return;
            
            container.innerHTML = `
                <div class="info-row">
                    <span class="info-label">ФИО:</span>
                    <span class="info-value">${escapeHtml(currentUserData?.fullName || 'Не указано')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email:</span>
                    <span class="info-value">${escapeHtml(currentUserData?.email || 'Не указан')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Телефон:</span>
                    <span class="info-value">${escapeHtml(currentUserData?.phone || 'Не указан')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Образование:</span>
                    <span class="info-value">${escapeHtml(currentUserData?.education || 'Не указано')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Дата регистрации:</span>
                    <span class="info-value">${formatDate(currentUserData?.createdAt)}</span>
                </div>
            `;
        }

        function displayDocumentsData() {
            const container = document.getElementById('documentsInfo');
            if (!container) return;
            
            container.innerHTML = `
                <div class="info-row">
                    <span class="info-label">Номер паспорта:</span>
                    <span class="info-value">${escapeHtml(currentUserData?.passportNumber || 'Не указан')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Кем выдан:</span>
                    <span class="info-value">${escapeHtml(currentUserData?.passportIssuedBy || 'Не указано')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Когда выдан:</span>
                    <span class="info-value">${escapeHtml(currentUserData?.passportIssueDate || 'Не указано')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">СНИЛС:</span>
                    <span class="info-value">${escapeHtml(currentUserData?.snils || 'Не указан')}</span>
                </div>
            `;
        }

        function displayAddressData() {
            const container = document.getElementById('addressInfo');
            if (!container) return;
            
            container.innerHTML = `
                <div class="info-row">
                    <span class="info-label">Фактический адрес:</span>
                    <span class="info-value">${escapeHtml(currentUserData?.actualAddress || 'Не указан')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Адрес прописки:</span>
                    <span class="info-value">${escapeHtml(currentUserData?.registrationAddress || 'Не указан')}</span>
                </div>
            `;
        }

        // ========== РЕДАКТИРОВАНИЕ ПРОФИЛЯ ==========
        function editProfile() {
            currentEditMode = 'profile';
            const container = document.getElementById('profileInfo');
            container.innerHTML = `
                <div class="form-group">
                    <label>ФИО</label>
                    <input type="text" id="editFullName" value="${escapeHtml(currentUserData?.fullName || '')}">
                </div>
                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" id="editPhone" value="${escapeHtml(currentUserData?.phone || '')}">
                </div>
                <div class="form-group">
                    <label>Образование</label>
                    <select id="editEducation">
                        <option value="высшее" ${currentUserData?.education === 'высшее' ? 'selected' : ''}>Высшее</option>
                        <option value="среднее-специальное" ${currentUserData?.education === 'среднее-специальное' ? 'selected' : ''}>Среднее специальное</option>
                        <option value="среднее" ${currentUserData?.education === 'среднее' ? 'selected' : ''}>Среднее</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button class="save-btn" onclick="saveProfile()">💾 Сохранить</button>
                    <button class="cancel-btn" onclick="cancelEdit()">❌ Отмена</button>
                </div>
            `;
        }

        async function saveProfile() {
            const user = window.auth.currentUser;
            if (!user) return;

            const updates = {
                fullName: document.getElementById('editFullName')?.value || '',
                phone: document.getElementById('editPhone')?.value || '',
                education: document.getElementById('editEducation')?.value || ''
            };

            try {
                await window.db.collection('users').doc(user.uid).update(updates);
                currentUserData = { ...currentUserData, ...updates };
                displayProfileData();
                showSuccess('✅ Данные успешно обновлены!');
                currentEditMode = null;
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                showError('Ошибка сохранения данных');
            }
        }

        // ========== РЕДАКТИРОВАНИЕ ДОКУМЕНТОВ ==========
        function editDocuments() {
            currentEditMode = 'documents';
            const container = document.getElementById('documentsInfo');
            container.innerHTML = `
                <div class="form-group">
                    <label>Номер паспорта</label>
                    <input type="text" id="editPassportNumber" value="${escapeHtml(currentUserData?.passportNumber || '')}" placeholder="Серия и номер паспорта">
                </div>
                <div class="form-group">
                    <label>Кем выдан паспорт</label>
                    <input type="text" id="editPassportIssuedBy" value="${escapeHtml(currentUserData?.passportIssuedBy || '')}" placeholder="Кем выдан">
                </div>
                <div class="form-group">
                    <label>Когда выдан паспорт</label>
                    <input type="date" id="editPassportIssueDate" value="${currentUserData?.passportIssueDate || ''}">
                </div>
                <div class="form-group">
                    <label>СНИЛС</label>
                    <input type="text" id="editSnils" value="${escapeHtml(currentUserData?.snils || '')}" placeholder="Номер СНИЛС">
                </div>
                <div class="form-actions">
                    <button class="save-btn" onclick="saveDocuments()">💾 Сохранить</button>
                    <button class="cancel-btn" onclick="cancelEdit()">❌ Отмена</button>
                </div>
            `;
        }

        async function saveDocuments() {
            const user = window.auth.currentUser;
            if (!user) return;

            const updates = {
                passportNumber: document.getElementById('editPassportNumber')?.value || '',
                passportIssuedBy: document.getElementById('editPassportIssuedBy')?.value || '',
                passportIssueDate: document.getElementById('editPassportIssueDate')?.value || '',
                snils: document.getElementById('editSnils')?.value || ''
            };

            try {
                await window.db.collection('users').doc(user.uid).update(updates);
                currentUserData = { ...currentUserData, ...updates };
                displayDocumentsData();
                showSuccess('✅ Данные успешно обновлены!');
                currentEditMode = null;
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                showError('Ошибка сохранения данных');
            }
        }

        // ========== РЕДАКТИРОВАНИЕ АДРЕСОВ ==========
        function editAddress() {
            currentEditMode = 'address';
            const container = document.getElementById('addressInfo');
            container.innerHTML = `
                <div class="form-group">
                    <label>Фактический адрес</label>
                    <input type="text" id="editActualAddress" value="${escapeHtml(currentUserData?.actualAddress || '')}" placeholder="Индекс, город, улица, дом, кв.">
                </div>
                <div class="form-group">
                    <label>Адрес прописки</label>
                    <input type="text" id="editRegistrationAddress" value="${escapeHtml(currentUserData?.registrationAddress || '')}" placeholder="Индекс, город, улица, дом, кв.">
                </div>
                <div class="form-actions">
                    <button class="save-btn" onclick="saveAddress()">💾 Сохранить</button>
                    <button class="cancel-btn" onclick="cancelEdit()">❌ Отмена</button>
                </div>
            `;
        }

        async function saveAddress() {
            const user = window.auth.currentUser;
            if (!user) return;

            const updates = {
                actualAddress: document.getElementById('editActualAddress')?.value || '',
                registrationAddress: document.getElementById('editRegistrationAddress')?.value || ''
            };

            try {
                await window.db.collection('users').doc(user.uid).update(updates);
                currentUserData = { ...currentUserData, ...updates };
                displayAddressData();
                showSuccess('✅ Данные успешно обновлены!');
                currentEditMode = null;
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                showError('Ошибка сохранения данных');
            }
        }

        // ========== ОТМЕНА РЕДАКТИРОВАНИЯ ==========
        function cancelEdit() {
            if (currentEditMode === 'profile') {
                displayProfileData();
            } else if (currentEditMode === 'documents') {
                displayDocumentsData();
            } else if (currentEditMode === 'address') {
                displayAddressData();
            }
            currentEditMode = null;
        }

        // ========== ВЫХОД ==========
        async function logout() {
            await window.auth.signOut();
            window.location.href = 'index.html';
        }

        // ========== ОБРАБОТЧИК ФОКУСА ОКНА ==========
        window.addEventListener('focus', () => {
            const activeTab = document.querySelector('.tab-content.active');
            if (activeTab && activeTab.id === 'additionalFieldsTab') {
                console.log('🔄 Фокус на окне, обновляем поля...');
                setTimeout(() => {
                    if (typeof refreshCustomFields === 'function') {
                        refreshCustomFields();
                    } else if (typeof loadCustomFields === 'function') {
                        loadCustomFields();
                    }
                }, 100);
            }
        });

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        window.auth.onAuthStateChanged(async (user) => {
            if (!user || !user.emailVerified) {
                window.location.href = 'index.html';
                return;
            }
            
            await loadUserData();
            
            // Загружаем пользовательские поля после загрузки данных
            setTimeout(() => {
                if (typeof loadCustomFields === 'function') {
                    loadCustomFields();
                }
            }, 500);
        });
    </script>
</body>
</html>
