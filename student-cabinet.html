<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Институт ДПО - Личный кабинет слушателя</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2c5f2d;
            --primary-dark: #1e3a1f;
            --primary-light: #4a7c4b;
            --secondary: #ffc107;
            --secondary-dark: #e0a800;
            --accent: #97233f;
            --gray-light: #f5f5f5;
            --gray: #ddd;
            --dark: #333;
            --white: #fff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ff9800;
            --info: #17a2b8;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-hover: 0 10px 20px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-sm: 10px;
        }
        body {
            font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            color: var(--dark);
        }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo { font-size: 36px; background: var(--secondary); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }
        .header h1 { font-size: clamp(18px, 5vw, 24px); font-weight: 500; }
        .user-info { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .user-name { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; font-size: 14px; }
        .btn-logout { background: var(--danger); color: var(--white); border: none; padding: 10px 24px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s ease; }
        .btn-logout:hover { background: #c82333; transform: translateY(-2px); box-shadow: var(--shadow); }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--white);
            padding: 10px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            background: var(--gray-light);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            color: var(--dark);
        }
        .tab-btn:hover { background: var(--gray); transform: translateY(-2px); }
        .tab-btn.active { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: var(--white); }
        .tab-content {
            display: none;
            background: var(--white);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .info-card {
            background: var(--gray-light);
            border-radius: var(--radius);
            padding: 20px;
        }
        .info-card h3 {
            color: var(--primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--gray);
            font-weight: 500;
        }
        .info-row {
            margin-bottom: 12px;
            padding: 10px;
            background: var(--white);
            border-radius: var(--radius-sm);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        .info-label { font-weight: bold; color: #555; min-width: 180px; }
        .info-value { color: var(--dark); flex: 1; }
        .edit-btn {
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            width: auto;
        }
        .edit-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: #555; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--gray);
            border-radius: var(--radius-sm);
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(44, 95, 45, 0.1);
        }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .save-btn { background: var(--success); width: auto; padding: 10px 20px; color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; }
        .cancel-btn { background: var(--secondary); width: auto; padding: 10px 20px; color: var(--dark); border: none; border-radius: var(--radius-sm); cursor: pointer; }
        .success-message, .error-message, .info-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: var(--radius-sm);
            display: none;
            z-index: 1001;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-hover);
            font-weight: 500;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .success-message { background: var(--success); color: white; }
        .error-message { background: var(--danger); color: white; }
        .info-message { background: var(--info); color: white; }
        .custom-field {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid var(--gray);
            border-radius: var(--radius-sm);
            background: #fafafa;
            transition: all 0.3s;
        }
        .custom-field.required-missing { border-left: 4px solid var(--warning); background: #fff8e1; }
        .radio-group { display: flex; flex-wrap: wrap; gap: 20px; padding: 10px 0; }
        .radio-group label { display: inline-flex; align-items: center; cursor: pointer; font-weight: normal; margin-bottom: 0; }
        .radio-group input[type="radio"] { width: 18px; height: 18px; margin-right: 8px; cursor: pointer; accent-color: var(--primary); }
        .warning-banner {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px 15px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .warning-btn {
            background: #ffc107;
            color: #856404;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            width: auto;
        }
        .save-fields-btn {
            background: var(--success);
            width: auto;
            padding: 10px 20px;
            margin-top: 10px;
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 500;
        }
        .save-fields-btn:hover { background: #1e7e34; transform: translateY(-2px); }
        .save-fields-btn:disabled { background: #6c757d; cursor: not-allowed; transform: none; }
        
        /* Модальное окно с предложением перезагрузить страницу */
        .reload-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
        }
        .reload-modal-content {
            background: white;
            border-radius: var(--radius);
            padding: 30px;
            max-width: 400px;
            text-align: center;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .reload-modal-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        .reload-modal h3 {
            color: var(--primary);
            margin-bottom: 10px;
        }
        .reload-modal p {
            color: #666;
            margin-bottom: 20px;
        }
        .reload-modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .reload-now-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: bold;
        }
        .reload-later-btn {
            background: var(--gray);
            color: var(--dark);
            border: none;
            padding: 10px 25px;
            border-radius: var(--radius-sm);
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .header { padding: 15px 20px; }
            .header h1 { font-size: 18px; }
            .tabs { flex-direction: column; }
            .tab-btn { width: 100%; }
            .info-row { flex-direction: column; align-items: flex-start; gap: 5px; }
            .info-label { min-width: auto; }
            .form-actions { flex-direction: column; }
            .form-actions button { width: 100%; }
            .warning-banner { flex-direction: column; text-align: center; }
            .tab-content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <div class="logo">🎓</div>
            <h1>Институт ДПО - Личный кабинет слушателя</h1>
        </div>
        <div class="user-info">
            <span class="user-name" id="userName">Загрузка...</span>
            <button class="btn-logout" onclick="logout()">🚪 Выйти</button>
        </div>
    </div>

    <div class="container">
        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>
        <div id="infoMessage" class="info-message"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('profile')">👤 Мои данные</button>
            <button class="tab-btn" onclick="switchTab('documents')">📄 Паспортные данные</button>
            <button class="tab-btn" onclick="switchTab('address')">🏠 Адреса</button>
            <button class="tab-btn" onclick="switchTab('additionalFields')">📋 Дополнительные поля</button>
        </div>

        <div id="profileTab" class="tab-content active">
            <div class="info-card">
                <h3>Личная информация</h3>
                <div id="profileInfo"></div>
                <button class="edit-btn" onclick="editProfile()">✏️ Редактировать профиль</button>
            </div>
        </div>

        <div id="documentsTab" class="tab-content">
            <div class="info-card">
                <h3>Паспортные данные</h3>
                <div id="documentsInfo"></div>
                <button class="edit-btn" onclick="editDocuments()">✏️ Редактировать документы</button>
            </div>
        </div>

        <div id="addressTab" class="tab-content">
            <div class="info-card">
                <h3>Адреса</h3>
                <div id="addressInfo"></div>
                <button class="edit-btn" onclick="editAddress()">✏️ Редактировать адреса</button>
            </div>
        </div>

        <div id="additionalFieldsTab" class="tab-content">
            <div class="info-card">
                <h3>📋 Дополнительная информация</h3>
                <div id="missingFieldsWarning" style="display: none;"></div>
                <div id="customFieldsContainer">
                    <div style="text-align: center; padding: 40px; color: #999;">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для перезагрузки -->
    <div id="reloadModal" class="reload-modal">
        <div class="reload-modal-content">
            <div class="reload-modal-icon">🔄</div>
            <h3>Требуется обновление страницы</h3>
            <p>Методист изменил список дополнительных полей. Для применения изменений необходимо обновить страницу.</p>
            <div class="reload-modal-buttons">
                <button class="reload-now-btn" onclick="forceReload()">Обновить сейчас</button>
                <button class="reload-later-btn" onclick="closeReloadModal()">Позже</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    
    <script>
        let currentUserData = null;
        let currentEditMode = null;
        let fieldsCollectionListener = null;
        let userDataListener = null;
        let pendingReload = false;
        let lastFieldIdsHash = '';

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'Не указана';
            try {
                const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
                return date.toLocaleDateString('ru-RU');
            } catch(e) {
                return 'Не указана';
            }
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showInfo(message) {
            const el = document.getElementById('infoMessage');
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function switchTab(tabName) {
            const tabs = ['profile', 'documents', 'address', 'additionalFields'];
            tabs.forEach(tab => {
                const tabElement = document.getElementById(`${tab}Tab`);
                const btnElement = document.querySelector(`[onclick="switchTab('${tab}')"]`);
                if (tabElement) {
                    if (tab === tabName) {
                        tabElement.classList.add('active');
                        if (btnElement) btnElement.classList.add('active');
                    } else {
                        tabElement.classList.remove('active');
                        if (btnElement) btnElement.classList.remove('active');
                    }
                }
            });
        }

        // ========== ЗАГРУЗКА ДАННЫХ ПОЛЬЗОВАТЕЛЯ ==========
        async function loadUserData() {
            const user = window.auth.currentUser;
            if (!user) return;

            try {
                const doc = await window.db.collection('users').doc(user.uid).get();
                
                if (!doc.exists) {
                    const defaultData = {
                        fullName: user.email.split('@')[0],
                        email: user.email,
                        phone: '',
                        education: '',
                        role: 'student',
                        emailVerified: user.emailVerified,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                        actualAddress: '',
                        registrationAddress: '',
                        passportNumber: '',
                        passportIssuedBy: '',
                        passportIssueDate: '',
                        snils: ''
                    };
                    await window.db.collection('users').doc(user.uid).set(defaultData);
                    currentUserData = defaultData;
                } else {
                    currentUserData = doc.data();
                }
                
                document.getElementById('userName').textContent = currentUserData.fullName || currentUserData.email;
                
                displayProfileData();
                displayDocumentsData();
                displayAddressData();
                
                listenToUserDataChanges(user.uid);
                
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                showError('Ошибка загрузки данных');
            }
        }

        function listenToUserDataChanges(userId) {
            if (userDataListener) userDataListener();
            
            userDataListener = window.db.collection('users').doc(userId).onSnapshot((doc) => {
                if (doc.exists) {
                    currentUserData = doc.data();
                    console.log('🔄 Данные пользователя обновлены');
                }
            }, (error) => {
                console.error('Ошибка слушателя пользователя:', error);
            });
        }

        function displayProfileData() {
            const container = document.getElementById('profileInfo');
            if (!container) return;
            container.innerHTML = `
                <div class="info-row"><span class="info-label">ФИО:</span><span class="info-value">${escapeHtml(currentUserData?.fullName || 'Не указано')}</span></div>
                <div class="info-row"><span class="info-label">Email:</span><span class="info-value">${escapeHtml(currentUserData?.email || 'Не указан')}</span></div>
                <div class="info-row"><span class="info-label">Телефон:</span><span class="info-value">${escapeHtml(currentUserData?.phone || 'Не указан')}</span></div>
                <div class="info-row"><span class="info-label">Образование:</span><span class="info-value">${escapeHtml(currentUserData?.education || 'Не указано')}</span></div>
                <div class="info-row"><span class="info-label">Дата регистрации:</span><span class="info-value">${formatDate(currentUserData?.createdAt)}</span></div>
            `;
        }

        function displayDocumentsData() {
            const container = document.getElementById('documentsInfo');
            if (!container) return;
            container.innerHTML = `
                <div class="info-row"><span class="info-label">Номер паспорта:</span><span class="info-value">${escapeHtml(currentUserData?.passportNumber || 'Не указан')}</span></div>
                <div class="info-row"><span class="info-label">Кем выдан:</span><span class="info-value">${escapeHtml(currentUserData?.passportIssuedBy || 'Не указано')}</span></div>
                <div class="info-row"><span class="info-label">Когда выдан:</span><span class="info-value">${escapeHtml(currentUserData?.passportIssueDate || 'Не указано')}</span></div>
                <div class="info-row"><span class="info-label">СНИЛС:</span><span class="info-value">${escapeHtml(currentUserData?.snils || 'Не указан')}</span></div>
            `;
        }

        function displayAddressData() {
            const container = document.getElementById('addressInfo');
            if (!container) return;
            container.innerHTML = `
                <div class="info-row"><span class="info-label">Фактический адрес:</span><span class="info-value">${escapeHtml(currentUserData?.actualAddress || 'Не указан')}</span></div>
                <div class="info-row"><span class="info-label">Адрес прописки:</span><span class="info-value">${escapeHtml(currentUserData?.registrationAddress || 'Не указан')}</span></div>
            `;
        }

        // ========== РЕДАКТИРОВАНИЕ ==========
        function editProfile() {
            currentEditMode = 'profile';
            const container = document.getElementById('profileInfo');
            container.innerHTML = `
                <div class="form-group"><label>ФИО</label><input type="text" id="editFullName" value="${escapeHtml(currentUserData?.fullName || '')}"></div>
                <div class="form-group"><label>Телефон</label><input type="tel" id="editPhone" value="${escapeHtml(currentUserData?.phone || '')}"></div>
                <div class="form-group"><label>Образование</label>
                    <select id="editEducation">
                        <option value="высшее" ${currentUserData?.education === 'высшее' ? 'selected' : ''}>Высшее</option>
                        <option value="среднее-специальное" ${currentUserData?.education === 'среднее-специальное' ? 'selected' : ''}>Среднее специальное</option>
                        <option value="среднее" ${currentUserData?.education === 'среднее' ? 'selected' : ''}>Среднее</option>
                    </select>
                </div>
                <div class="form-actions"><button class="save-btn" onclick="saveProfile()">💾 Сохранить</button><button class="cancel-btn" onclick="cancelEdit()">❌ Отмена</button></div>
            `;
        }

        async function saveProfile() {
            const user = window.auth.currentUser;
            if (!user) return;
            const updates = {
                fullName: document.getElementById('editFullName')?.value || '',
                phone: document.getElementById('editPhone')?.value || '',
                education: document.getElementById('editEducation')?.value || ''
            };
            try {
                await window.db.collection('users').doc(user.uid).update(updates);
                currentUserData = { ...currentUserData, ...updates };
                displayProfileData();
                showSuccess('✅ Данные успешно обновлены!');
                currentEditMode = null;
            } catch (error) {
                showError('Ошибка сохранения данных');
            }
        }

        function editDocuments() {
            currentEditMode = 'documents';
            const container = document.getElementById('documentsInfo');
            container.innerHTML = `
                <div class="form-group"><label>Номер паспорта</label><input type="text" id="editPassportNumber" value="${escapeHtml(currentUserData?.passportNumber || '')}"></div>
                <div class="form-group"><label>Кем выдан паспорт</label><input type="text" id="editPassportIssuedBy" value="${escapeHtml(currentUserData?.passportIssuedBy || '')}"></div>
                <div class="form-group"><label>Когда выдан паспорт</label><input type="date" id="editPassportIssueDate" value="${currentUserData?.passportIssueDate || ''}"></div>
                <div class="form-group"><label>СНИЛС</label><input type="text" id="editSnils" value="${escapeHtml(currentUserData?.snils || '')}"></div>
                <div class="form-actions"><button class="save-btn" onclick="saveDocuments()">💾 Сохранить</button><button class="cancel-btn" onclick="cancelEdit()">❌ Отмена</button></div>
            `;
        }

        async function saveDocuments() {
            const user = window.auth.currentUser;
            if (!user) return;
            const updates = {
                passportNumber: document.getElementById('editPassportNumber')?.value || '',
                passportIssuedBy: document.getElementById('editPassportIssuedBy')?.value || '',
                passportIssueDate: document.getElementById('editPassportIssueDate')?.value || '',
                snils: document.getElementById('editSnils')?.value || ''
            };
            try {
                await window.db.collection('users').doc(user.uid).update(updates);
                currentUserData = { ...currentUserData, ...updates };
                displayDocumentsData();
                showSuccess('✅ Данные успешно обновлены!');
                currentEditMode = null;
            } catch (error) {
                showError('Ошибка сохранения данных');
            }
        }

        function editAddress() {
            currentEditMode = 'address';
            const container = document.getElementById('addressInfo');
            container.innerHTML = `
                <div class="form-group"><label>Фактический адрес</label><input type="text" id="editActualAddress" value="${escapeHtml(currentUserData?.actualAddress || '')}"></div>
                <div class="form-group"><label>Адрес прописки</label><input type="text" id="editRegistrationAddress" value="${escapeHtml(currentUserData?.registrationAddress || '')}"></div>
                <div class="form-actions"><button class="save-btn" onclick="saveAddress()">💾 Сохранить</button><button class="cancel-btn" onclick="cancelEdit()">❌ Отмена</button></div>
            `;
        }

        async function saveAddress() {
            const user = window.auth.currentUser;
            if (!user) return;
            const updates = {
                actualAddress: document.getElementById('editActualAddress')?.value || '',
                registrationAddress: document.getElementById('editRegistrationAddress')?.value || ''
            };
            try {
                await window.db.collection('users').doc(user.uid).update(updates);
                currentUserData = { ...currentUserData, ...updates };
                displayAddressData();
                showSuccess('✅ Данные успешно обновлены!');
                currentEditMode = null;
            } catch (error) {
                showError('Ошибка сохранения данных');
            }
        }

        function cancelEdit() {
            if (currentEditMode === 'profile') displayProfileData();
            else if (currentEditMode === 'documents') displayDocumentsData();
            else if (currentEditMode === 'address') displayAddressData();
            currentEditMode = null;
        }

        // ========== ФУНКЦИИ ДЛЯ ПОЛЕЙ ==========
        function getFieldsHashFromSnapshot(snapshot) {
            const ids = [];
            snapshot.forEach(doc => {
                ids.push(doc.id);
            });
            return ids.sort().join('|');
        }

        function showReloadModal() {
            if (pendingReload) return;
            pendingReload = true;
            const modal = document.getElementById('reloadModal');
            if (modal) modal.style.display = 'flex';
        }

        function closeReloadModal() {
            const modal = document.getElementById('reloadModal');
            if (modal) modal.style.display = 'none';
            pendingReload = false;
        }

        function forceReload() {
            window.location.reload();
        }

        // ========== ГЛАВНЫЙ СЛУШАТЕЛЬ ИЗМЕНЕНИЙ ==========
        function listenToCustomFieldsChanges() {
            console.log('🔔 Активация слушателя изменений custom_fields...');
            
            fieldsCollectionListener = window.db.collection('custom_fields').onSnapshot((snapshot) => {
                // Получаем текущий хэш полей
                const currentHash = getFieldsHashFromSnapshot(snapshot);
                
                console.log('📢 Обнаружено изменение в custom_fields!');
                console.log('   Текущий хэш:', currentHash);
                console.log('   Предыдущий хэш:', lastFieldIdsHash);
                
                // При первом запуске сохраняем хэш и выходим
                if (lastFieldIdsHash === '') {
                    lastFieldIdsHash = currentHash;
                    console.log('   Первоначальный хэш сохранён');
                    return;
                }
                
                // Если хэш изменился - значит удалилось или добавилось поле
                if (lastFieldIdsHash !== currentHash) {
                    console.log('⚠️ ХЭШ ИЗМЕНИЛСЯ! Показываем модальное окно для перезагрузки');
                    lastFieldIdsHash = currentHash;
                    showReloadModal();
                } else {
                    console.log('   Хэш не изменился, перезагрузка не требуется');
                }
            }, (error) => {
                console.error('❌ Ошибка слушателя:', error);
            });
            
            console.log('✅ Слушатель изменений custom_fields активирован');
        }

        // ========== ФУНКЦИЯ ДЛЯ РУЧНОЙ ПЕРЕЗАГРУЗКИ ==========
        function checkFieldsAndReloadIfNeeded() {
            window.db.collection('custom_fields').get().then(snapshot => {
                const currentHash = getFieldsHashFromSnapshot(snapshot);
                if (lastFieldIdsHash !== '' && lastFieldIdsHash !== currentHash) {
                    console.log('⚠️ Обнаружено расхождение хэшей, требуется перезагрузка');
                    lastFieldIdsHash = currentHash;
                    showReloadModal();
                }
            }).catch(err => console.error('Ошибка проверки:', err));
        }

        // ========== ОБРАБОТЧИКИ ==========
        window.addEventListener('focus', () => {
            console.log('🔄 Фокус на окне, проверяем необходимость перезагрузки');
            checkFieldsAndReloadIfNeeded();
        });

        window.addEventListener('storage', function(event) {
            if (event.key === 'fields_updated') {
                console.log('📢 Получено уведомление об изменении полей');
                checkFieldsAndReloadIfNeeded();
            }
        });

        // ========== ВЫХОД ==========
        async function logout() {
            if (fieldsCollectionListener) fieldsCollectionListener();
            if (userDataListener) userDataListener();
            await window.auth.signOut();
            window.location.href = 'index.html';
        }

        // ========== ЗАГРУЗКА ДАННЫХ ПОЛЕЙ ПРИ ОТКРЫТИИ ВКЛАДКИ ==========
        async function loadFieldsData() {
            const container = document.getElementById('customFieldsContainer');
            if (!container) return;
            
            try {
                const userId = window.auth.currentUser?.uid;
                if (!userId) return;
                
                const fieldsSnapshot = await window.db.collection('custom_fields').get();
                const allFields = [];
                fieldsSnapshot.forEach(doc => {
                    allFields.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                const activeFields = allFields.filter(f => f.isActive !== false);
                activeFields.sort((a, b) => (a.order || 0) - (b.order || 0));
                
                const userDoc = await window.db.collection('users').doc(userId).get();
                const userValues = userDoc.exists ? (userDoc.data().customFields || {}) : {};
                
                if (activeFields.length === 0) {
                    container.innerHTML = `<div style="text-align: center; padding: 40px; color: #999;"><div style="font-size: 48px; margin-bottom: 10px;">📭</div><p>Нет дополнительных полей для заполнения</p></div>`;
                    return;
                }
                
                let html = `<div style="margin-bottom: 20px;"><h4 style="color: var(--primary);">📋 Дополнительная информация</h4><p style="color: #666; font-size: 13px;">Поля, отмеченные <span style="color: #dc3545;">*</span>, обязательны для заполнения</p></div>`;
                
                for (const field of activeFields) {
                    const value = userValues[field.id] || '';
                    const isFilled = value && value.trim() !== '';
                    const warningClass = (!isFilled && field.isRequired) ? 'required-missing' : '';
                    
                    html += `
                        <div class="custom-field ${warningClass}" data-field-id="${field.id}">
                            <label style="display: block; margin-bottom: 8px; font-weight: 500;">
                                ${escapeHtml(field.label)}
                                ${field.isRequired ? '<span style="color: #dc3545;">*</span>' : ''}
                                ${!isFilled && field.isRequired ? '<span style="background: #ff9800; color: white; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-left: 8px;">Не заполнено</span>' : ''}
                            </label>
                            ${renderFieldForm(field, value)}
                            ${field.semantics ? `<small style="display: block; margin-top: 8px; color: #667eea;">🔗 Семантика: <a href="${escapeHtml(field.semantics)}" target="_blank">${escapeHtml(field.semantics)}</a></small>` : ''}
                        </div>
                    `;
                }
                
                html += `<div style="margin-top: 20px;"><button class="save-fields-btn" onclick="saveFieldsData()">💾 Сохранить дополнительную информацию</button></div>`;
                container.innerHTML = html;
                
                const missingFields = activeFields.filter(f => f.isRequired && (!userValues[f.id] || userValues[f.id].trim() === ''));
                const warningContainer = document.getElementById('missingFieldsWarning');
                if (warningContainer) {
                    if (missingFields.length > 0) {
                        const fieldNames = missingFields.map(f => f.label).join(', ');
                        warningContainer.innerHTML = `
                            <div class="warning-banner">
                                <span>⚠️ Внимание! У вас есть незаполненные обязательные поля: ${fieldNames}</span>
                                <button onclick="document.getElementById('customFieldsContainer').scrollIntoView({behavior: 'smooth'})" class="warning-btn">Заполнить сейчас</button>
                            </div>
                        `;
                        warningContainer.style.display = 'block';
                    } else {
                        warningContainer.style.display = 'none';
                    }
                }
                
            } catch (error) {
                console.error('Ошибка загрузки полей:', error);
                container.innerHTML = '<p style="color: #dc3545; text-align: center; padding: 20px;">❌ Ошибка загрузки дополнительных полей</p>';
            }
        }
        
        function renderFieldForm(field, value) {
            const fieldId = `field_${field.id}`;
            
            switch (field.type) {
                case 'radio':
                    if (!field.options || !field.options.length) return '<p style="color: #dc3545;">Ошибка: нет вариантов</p>';
                    let radioHtml = `<div class="radio-group">`;
                    for (const opt of field.options) {
                        const checked = (value === opt) ? 'checked' : '';
                        radioHtml += `<label><input type="radio" name="${fieldId}" value="${escapeHtml(opt)}" ${checked}> ${escapeHtml(opt)}</label>`;
                    }
                    radioHtml += `</div>`;
                    return radioHtml;
                case 'select':
                    if (!field.options || !field.options.length) return '<p style="color: #dc3545;">Ошибка: нет вариантов</p>';
                    let selectHtml = `<select id="${fieldId}"><option value="">-- Выберите --</option>`;
                    for (const opt of field.options) {
                        const selected = (value === opt) ? 'selected' : '';
                        selectHtml += `<option value="${escapeHtml(opt)}" ${selected}>${escapeHtml(opt)}</option>`;
                    }
                    selectHtml += `</select>`;
                    return selectHtml;
                case 'textarea':
                    return `<textarea id="${fieldId}" placeholder="${field.placeholder || ''}" rows="3">${escapeHtml(value)}</textarea>`;
                case 'date':
                    return `<input type="date" id="${fieldId}" value="${escapeHtml(value)}">`;
                default:
                    return `<input type="${field.type || 'text'}" id="${fieldId}" placeholder="${field.placeholder || ''}" value="${escapeHtml(value)}">`;
            }
        }
        
        async function saveFieldsData() {
            const userId = window.auth.currentUser?.uid;
            if (!userId) return;
            
            const fieldsSnapshot = await window.db.collection('custom_fields').get();
            const activeFieldIds = [];
            fieldsSnapshot.forEach(doc => {
                if (doc.data().isActive !== false) {
                    activeFieldIds.push(doc.id);
                }
            });
            
            const values = {};
            for (const fieldId of activeFieldIds) {
                const radioSelected = document.querySelector(`input[name="field_${fieldId}"]:checked`);
                if (radioSelected) {
                    values[fieldId] = radioSelected.value;
                } else {
                    const element = document.getElementById(`field_${fieldId}`);
                    if (element) {
                        values[fieldId] = element.value;
                    }
                }
            }
            
            const btn = document.querySelector('.save-fields-btn');
            const originalText = btn?.textContent;
            if (btn) {
                btn.textContent = '⏳ Сохранение...';
                btn.disabled = true;
            }
            
            try {
                await window.db.collection('users').doc(userId).update({ customFields: values });
                showSuccess('✅ Данные успешно сохранены!');
                await loadFieldsData();
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                showError('❌ Ошибка сохранения: ' + error.message);
            } finally {
                if (btn) {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            }
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        window.auth.onAuthStateChanged(async (user) => {
            if (!user || !user.emailVerified) {
                window.location.href = 'index.html';
                return;
            }
            
            await loadUserData();
            
            // Активируем слушатель изменений
            listenToCustomFieldsChanges();
            
            // Загружаем поля (при переключении на вкладку)
            const additionalFieldsTab = document.getElementById('additionalFieldsTab');
            if (additionalFieldsTab) {
                // Наблюдатель за активацией вкладки
                const observer = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                        if (mutation.attributeName === 'class') {
                            if (additionalFieldsTab.classList.contains('active')) {
                                console.log('📋 Вкладка полей активирована, загружаем данные');
                                loadFieldsData();
                            }
                        }
                    });
                });
                observer.observe(additionalFieldsTab, { attributes: true });
            }
        });
        
        window.refreshFields = loadFieldsData;
        window.forceReload = forceReload;
        window.closeReloadModal = closeReloadModal;
    </script>
</body>
</html>
