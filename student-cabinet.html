<!-- student-cabinet.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self' https://*.gstatic.com https://*.googleapis.com https://*.firebaseio.com https://*.firebase.com https://*.firebasestorage.googleapis.com; 
               script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.gstatic.com https://*.googleapis.com https://*.firebaseio.com https://cdn.jsdelivr.net; 
               style-src 'self' 'unsafe-inline' https://*.googleapis.com https://cdn.jsdelivr.net; 
               img-src 'self' data: blob: https://*.firebasestorage.googleapis.com https://*.github.com https://*.githubassets.com; 
               connect-src 'self' https://*.firebaseio.com https://*.firebase.com https://*.googleapis.com wss://*.firebaseio.com; 
               font-src 'self' https://*.gstatic.com https://cdn.jsdelivr.net; 
               frame-src 'self' https://*.firebaseapp.com; 
               media-src 'self' https://*.firebasestorage.googleapis.com;">
    <title>Личный кабинет слушателя - Институт ДПО</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-building me-2"></i>Институт ДПО
            </a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white" id="userName"></span>
                <button class="btn btn-outline-light btn-sm rounded-pill ms-3" onclick="AuthService.signOut()">
                    <i class="bi bi-box-arrow-right me-1"></i>Выйти
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row">
            <div class="col-12">
                <h2 class="mb-4 fw-bold text-primary">
                    <i class="bi bi-person-badge me-2"></i>Личный кабинет слушателя
                </h2>
            </div>
        </div>

        <div class="row g-4">
            <!-- Карточка профиля -->
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-header bg-white border-0 pt-4 px-4">
                        <h4 class="fw-bold mb-0">
                            <i class="bi bi-info-circle text-primary me-2"></i>Персональные данные
                        </h4>
                    </div>
                    <div class="card-body px-4 pb-4">
                        <div id="profileFields" class="row g-3">
                            <!-- Заполняется динамически -->
                        </div>
                        <button class="btn btn-primary rounded-pill mt-3" onclick="toggleEditMode()">
                            <i class="bi bi-pencil me-1"></i>Редактировать
                        </button>
                        <button class="btn btn-success rounded-pill mt-3 ms-2 d-none" id="saveButton" onclick="saveProfile()">
                            <i class="bi bi-check-lg me-1"></i>Сохранить
                        </button>
                    </div>
                </div>
            </div>

            <!-- Карточка курса -->
            <div class="col-lg-4">
                <div class="card shadow-sm border-0 rounded-4 bg-gradient-info text-white">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3">
                            <i class="bi bi-mortarboard me-2"></i>Текущий курс
                        </h5>
                        <h3 class="display-6 fw-bold" id="currentCourse">Не назначен</h3>
                        <p class="text-white-50 mb-0" id="courseStatus"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Секция документов -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-header bg-white border-0 pt-4 px-4">
                        <h4 class="fw-bold mb-0">
                            <i class="bi bi-file-earmark-text text-primary me-2"></i>Документы
                        </h4>
                    </div>
                    <div class="card-body px-4 pb-4">
                        <div class="row g-4" id="documentsGrid">
                            <!-- Заполняется динамически -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="image-compressor.js"></script>
    <script src="document-service.js"></script>
    <script src="student.js"></script>
</body>
</html>
