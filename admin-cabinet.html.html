<!-- Вкладка управления полями - обновленная версия -->
<div id="fieldsTab" class="tab-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
        <h3>⚙️ Управление дополнительными полями</h3>
        <button class="btn-primary" onclick="openFieldEditor()">➕ Создать поле</button>
    </div>
    <div id="fieldsListContainer"></div>
</div>

<!-- Модальное окно для полей (обновленное) -->
<div id="fieldEditorModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <div class="modal-header">
            <h3 id="fieldEditorTitle">Создание поля</h3>
            <span class="close" onclick="closeFieldEditor()">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Название поля *</label>
                <input type="text" id="fieldLabel" placeholder="Например: Пол">
            </div>
            <div class="form-group">
                <label>ID поля (латиницей) *</label>
                <input type="text" id="fieldId" placeholder="Например: gender">
                <small style="color: #666;">Уникальный идентификатор, только латиница, без пробелов</small>
            </div>
            <div class="form-group">
                <label>Тип поля</label>
                <select id="fieldType" onchange="toggleOptionsFields()">
                    <option value="text">📝 Текстовое поле</option>
                    <option value="textarea">📄 Многострочный текст</option>
                    <option value="email">📧 Email</option>
                    <option value="tel">📞 Телефон</option>
                    <option value="date">📅 Дата</option>
                    <option value="number">#️⃣ Число</option>
                    <option value="radio">🔘 Радиокнопка (один выбор)</option>
                    <option value="select">📋 Выпадающий список</option>
                </select>
            </div>
            
            <!-- Блок для опций (radio/select) -->
            <div id="optionsBlock" style="display: none;">
                <div class="form-group">
                    <label>Варианты ответов</label>
                    <div id="optionsList">
                        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                            <input type="text" placeholder="Вариант 1" class="option-input" style="flex: 1;">
                            <button type="button" onclick="removeOption(this)" style="width: auto; background: #dc3545; padding: 10px 15px;">✖</button>
                        </div>
                    </div>
                    <button type="button" onclick="addOptionField()" style="width: auto; background: #28a745; padding: 8px 15px; margin-top: 5px;">➕ Добавить вариант</button>
                    <small style="color: #666; display: block; margin-top: 5px;">Для radio и select укажите возможные варианты ответов</small>
                </div>
            </div>
            
            <div class="form-group">
                <label>Семантика (URL схемы)</label>
                <input type="url" id="fieldSemantics" placeholder="http://schemas.titul24.ru/simplex/...">
                <small style="color: #666;">Необязательно. Ссылка на схему данных</small>
            </div>
            <div class="form-group">
                <label>Placeholder (подсказка)</label>
                <input type="text" id="fieldPlaceholder" placeholder="Пример ввода...">
                <small style="color: #666;">Для radio/select не используется</small>
            </div>
            <div class="form-group">
                <label>Порядок отображения</label>
                <input type="number" id="fieldOrder" value="0">
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="fieldRequired"> Обязательное поле</label>
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="fieldActive" checked> Активно</label>
            </div>
            <div class="form-actions" style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-primary" onclick="saveField()">💾 Сохранить</button>
                <button class="btn-secondary" onclick="closeFieldEditor()">❌ Отмена</button>
            </div>
        </div>
    </div>
</div>
