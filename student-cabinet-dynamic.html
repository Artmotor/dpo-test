<!-- student-cabinet-dynamic.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет слушателя</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2c5f2d;
            --primary-dark: #1e3a1f;
            --secondary: #ffc107;
            --danger: #dc3545;
            --success: #28a745;
            --gray-light: #f5f5f5;
            --gray: #ddd;
            --dark: #333;
            --white: #fff;
            --radius: 16px;
            --radius-sm: 10px;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo { font-size: 36px; background: var(--secondary); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-logout {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        /* Динамические вкладки */
        .dynamic-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: white;
            padding: 10px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex-wrap: wrap;
        }
        .dynamic-tab-btn {
            padding: 12px 28px;
            background: var(--gray-light);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .dynamic-tab-btn:hover { background: var(--gray); transform: translateY(-2px); }
        .dynamic-tab-btn.active { background: var(--primary); color: white; }
        
        .dynamic-tab-pane {
            display: none;
            background: white;
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: fadeIn 0.3s;
        }
        .dynamic-tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Сетка полей */
        .dynamic-fields-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .dynamic-field-card {
            background: var(--gray-light);
            border-radius: var(--radius-sm);
            padding: 18px;
            transition: all 0.3s;
            position: relative;
        }
        .dynamic-field-card.field-missing {
            border-left: 4px solid #ff9800;
            background: #fff8e1;
        }
        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .field-label {
            font-weight: 600;
            color: var(--primary);
            font-size: 14px;
        }
        .required-star { color: var(--danger); margin-left: 4px; }
        .field-edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .field-edit-btn:hover { background: var(--gray); }
        .field-value {
            font-size: 15px;
            color: var(--dark);
            word-break: break-word;
        }
        .empty-value { color: #999; font-style: italic; }
        .multiline-value {
            white-space: pre-wrap;
            background: rgba(0,0,0,0.03);
            padding: 8px;
            border-radius: 8px;
        }
        .field-semantics {
            margin-top: 8px;
            font-size: 11px;
            color: #667eea;
        }
        .field-semantics a { color: #667eea; text-decoration: none; }
        .field-placeholder {
            margin-top: 8px;
            font-size: 11px;
            color: #999;
        }
        .field-input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--gray);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        .field-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 10px 0;
        }
        .radio-label {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            gap: 6px;
        }
        .edit-actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .edit-all-btn, .save-all-btn, .cancel-edit-btn {
            padding: 12px 30px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .edit-all-btn { background: var(--primary); color: white; }
        .edit-all-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .save-all-btn { background: var(--success); color: white; }
        .save-all-btn:hover { background: #1e7e34; transform: translateY(-2px); }
        .cancel-edit-btn { background: var(--secondary); color: var(--dark); }
        .cancel-edit-btn:hover { background: #e0a800; transform: translateY(-2px); }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: var(--radius-sm);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-weight: 500;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-success { background: var(--success); color: white; }
        .toast-error { background: var(--danger); color: white; }
        .toast-warning { background: #ff9800; color: white; }
        
        @media (max-width: 768px) {
            .dynamic-tabs { flex-direction: column; }
            .dynamic-tab-btn { width: 100%; text-align: center; }
            .dynamic-fields-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <div class="logo">🎓</div>
            <h1>Личный кабинет слушателя</h1>
        </div>
        <div class="user-info">
            <span id="userName">Загрузка...</span>
            <button class="btn-logout" onclick="logout()">🚪 Выйти</button>
        </div>
    </div>

    <div class="container">
        <div id="dynamicProfileContainer"></div>
    </div>

    <div id="toastMessage" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    
    <script>
        // Глобальные функции
        async function logout() {
            try {
                await window.auth.signOut();
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Ошибка выхода:', error);
            }
        }
        
        function showToast(message, type) {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        // Инициализация
        window.addEventListener('DOMContentLoaded', () => {
            window.auth.onAuthStateChanged(async (user) => {
                if (!user) {
                    window.location.href = 'index.html';
                    return;
                }
                
                if (!user.emailVerified) {
                    showToast('Подтвердите email перед входом', 'warning');
                    setTimeout(async () => {
                        await window.auth.signOut();
                        window.location.href = 'index.html';
                    }, 3000);
                    return;
                }
                
                // Загружаем имя пользователя
                const userDoc = await window.db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                document.getElementById('userName').textContent = userData?.fullName || user.email;
                
                // Инициализируем динамический профиль
                window.dynamicProfile = new DynamicProfile();
                await window.dynamicProfile.init(user.uid);
            });
        });
    </script>
    
    <script src="dynamic-profile.js"></script>
</body>
</html>
